<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sellora – Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #eef0f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ── Brand header ── */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: #4f46e5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .brand-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1e1e2e;
            letter-spacing: -0.3px;
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border-radius: 18px;
            padding: 36px 32px 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
        }

        .card-title {
            font-size: 1.65rem;
            font-weight: 800;
            color: #1e1e2e;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: #8a8fa8;
            text-align: center;
            margin-top: 6px;
            margin-bottom: 28px;
        }

        /* ── Form ── */
        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #2d2d3a;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 44px 12px 14px;
            border: 1.5px solid #e2e4ef;
            border-radius: 10px;
            font-size: 0.92rem;
            color: #1e1e2e;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder {
            color: #b3b8cc;
        }

        input:focus {
            border-color: #4f46e5;
            background: #fff;
        }

        /* eye toggle */
        .eye-btn {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3b8;
            display: flex;
            align-items: center;
        }

        .eye-btn:hover {
            color: #4f46e5;
        }

        /* ── Forgot password ── */
        .row-forgot {
            display: flex;
            justify-content: flex-end;
            margin-top: -10px;
            margin-bottom: 18px;
        }

        .row-forgot a {
            font-size: 0.82rem;
            color: #4f46e5;
            font-weight: 600;
            text-decoration: none;
        }

        .row-forgot a:hover {
            text-decoration: underline;
        }

        /* ── Submit button ── */
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-primary:active {
            transform: scale(0.99);
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            color: #b3b8cc;
            font-size: 0.82rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8eaf2;
        }

        /* ── Social buttons ── */
        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 8px;
            border: 1.5px solid #e2e4ef;
            border-radius: 10px;
            background: #fff;
            font-size: 0.88rem;
            font-weight: 600;
            color: #2d2d3a;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .btn-social:hover {
            border-color: #4f46e5;
            background: #f5f5ff;
        }

        .btn-social svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.875rem;
            color: #8a8fa8;
        }

        .card-footer a {
            color: #4f46e5;
            font-weight: 700;
            text-decoration: none;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        /* ── Toast ── */
        .toast {
            display: none;
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 600;
            color: #fff;
            z-index: 999;
            animation: fadeUp 0.3s ease;
        }

        .toast.success { background: #22c55e; }
        .toast.error   { background: #ef4444; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>

    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 12l10 5 10-5M2 17l10 5 10-5"/>
            </svg>
        </div>
        <span class="brand-name">Sellora</span>
    </div>

    <div class="card">
        <h1 class="card-title">Welcome back</h1>
        <p class="card-subtitle">Sign in to continue to your account.</p>

        <div class="field">
            <label for="email">Email</label>
            <div class="input-wrap">
                <input type="email" id="email" placeholder="sellostars@company.com" autocomplete="email" />
            </div>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
                <button class="eye-btn" type="button" onclick="togglePwd()" aria-label="Toggle password visibility">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477
                               0 8.268 2.943 9.542 7-1.274 4.057-5.065
                               7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="row-forgot">
            <a href="#">Forgot password?</a>
        </div>

        <button class="btn-primary" onclick="handleLogin()">Sign In</button>

        <div class="divider">Or sign in with</div>

        <div class="social-row">
            <button class="btn-social" type="button">
                <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                Google
            </button>

            <button class="btn-social" type="button">
                <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.5 269-317.5 70.1 0 128.4 46.4 172.5 46.4 39.2 0 107.1-49 185.8-49 29.6 0 108.2 2.6 168.6 71.5zm-234.5-172.5c31.8-38.2 54.3-91.5 54.3-144.8 0-7.1-.6-14.3-1.9-20.1-51.6 1.9-112.3 34.4-149.2 80.1-28.5 32.4-55.1 85.7-55.1 139.9 0 7.7 1.3 15.5 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 46.4 0 102.5-31.2 136.4-74.5z"/>
                </svg>
                Apple
            </button>
        </div>

        <p class="card-footer">
            Don't have an account? <a href="/register">Sign up</a>
        </p>
    </div>

    <div class="toast" id="toast"></div>

    <script>

    
        function togglePwd() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477
                           0-8.268-2.943-9.542-7a9.956 9.956 0
                           012.293-3.95M6.938 6.938A9.956 9.956 0 0112
                           5c4.477 0 8.268 2.943 9.542 7a9.956 9.956 0
                           01-1.48 2.862M6.938 6.938L3 3m3.938
                           3.938l10.124 10.124M16.5 16.5L21 21"/>
                `;
            } else {
                input.type = 'password';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477
                           0 8.268 2.943 9.542 7-1.274 4.057-5.065
                           7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
            }
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type}`;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3500);
        }

        async function handleLogin() {

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                return showToast('Please fill in all fields.', 'error');
            }

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    credentials: 'include', // 🛠️ Added flag to accept cross-origin or local authentication cookies
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                });

                const data = await res.json();

                if (data.success) {
                    showToast('Login successful! Redirecting…', 'success');

    
                    // Extract the dynamic path sent back from the Node.js server
                    const redirectUrl = (data.data && data.data.redirectTo) ? data.data.redirectTo : '/dashboard';
    
                    setTimeout(() => { 
                        window.location.href = redirectUrl; 
                    }, 1200);
                }

                else {
                    showToast(data.message || 'Login failed.', 'error');
                }
            } catch (err) {
                showToast('Network error. Please try again.', 'error');
            }
        }
    </script>
</body>
</html>
