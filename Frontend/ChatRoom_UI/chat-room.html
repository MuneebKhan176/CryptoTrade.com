/** Small time + edited-tag + (own messages only) status-ticks row, used
 *  at the bottom-right of a text bubble — matches WhatsApp's inline
 *  timestamp instead of a separate meta line above the message. */
function buildBottomRow(message, mine) {
  const row = document.createElement('div');
  row.className = 'msg-bottom-row';
  if (message.edited) {
    const tag = document.createElement('span');
    tag.className = 'edited-tag-inline';
    tag.textContent = 'edited';
    row.appendChild(tag);
  }
  const timeSpan = document.createElement('span');
  timeSpan.className = 'msg-time-text';
  timeSpan.textContent = message.timestamp ? new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
  row.appendChild(timeSpan);
  let statusEl = null;
  if (mine && !message.deletedForEveryone) {
    statusEl = document.createElement('span');
    statusEl.className = 'msg-status-wrap';
    statusEl.style.cssText = 'display:inline-flex;align-items:center;';
    row.appendChild(statusEl);
  }
  return { row, statusEl };
}

/** Same time/ticks, but overlaid directly on media (image/video) when a
 *  message has no caption text — matches WhatsApp/Telegram's overlay
 *  timestamp in the corner of a bare photo/video bubble. */
function buildMediaTimeOverlay(message, mine) {
  const overlay = document.createElement('div');
  overlay.className = 'media-time-overlay';
  const timeSpan = document.createElement('span');
  timeSpan.textContent = message.timestamp ? new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
  overlay.appendChild(timeSpan);
  let statusEl = null;
  if (mine && !message.deletedForEveryone) {
    statusEl = document.createElement('span');
    statusEl.style.cssText = 'display:inline-flex;align-items:center;';
    overlay.appendChild(statusEl);
  }
  return { overlay, statusEl };
}

/**
 * Builds a reply-quote element for a message (or null if the message
 * isn't a reply / has been deleted). Shared by every place that needs
 * to insert the quote — always placed directly below the sender name
 * (incoming) or, for own messages which show no name line, at the top
 * of the bubble content, per the required order:
 *   Display Name -> Reply Preview -> Message Content
 */
function buildReplyQuoteEl(message) {
  if (!message.replyTo || message.deletedForEveryone) return null;
  const quote = document.createElement('div');
  quote.className = 'reply-quote';
  quote.innerHTML = `<span class="reply-quote-from">${escapeHtml(message.replyTo.from)}</span><span class="reply-quote-text">${escapeHtml(message.replyTo.textPreview)}</span>`;
  quote.addEventListener('click', (e) => { e.stopPropagation(); jumpToMessage(message.replyTo.id); });
  return quote;
}

/** Header row shown INSIDE an incoming message's container: the sender's
 *  name at top-left and a down-arrow menu button at top-right, on the
 *  same row. The menu button is hidden by default and only revealed on
 *  hover (see .msg-header-menu-btn CSS). Never used for the current
 *  user's own messages — those use buildOwnMenuHeader() instead, which
 *  is a standalone floating button rather than a row (see below).
 *  Colored per-sender (same hash as the avatar fallback) with black
 *  text/icon so it reads clearly regardless of the bubble's own (dark)
 *  background.
 *  NOTE: no admin badge here by design — the "Admin" pill is rendered
 *  ONLY in the sidebar online-users list (see updateUsersList). */
function buildMsgHeaderRow(username, messageId, mine, showMenu) {
  const row = document.createElement('div');
  row.className = 'msg-header-row';
  row.style.background = colorForName(username);

  const nameEl = document.createElement('span');
  nameEl.className = 'msg-header-name';
  nameEl.textContent = username;
  row.appendChild(nameEl);

  if (showMenu !== false) {
    const menuBtn = document.createElement('button');
    menuBtn.type = 'button';
    menuBtn.className = 'msg-header-menu-btn';
    menuBtn.title = 'More options';
    menuBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
    // FIX: resolve the message id LIVE from the row's dataset at click
    // time instead of trusting the `messageId` captured in this
    // closure. Own (optimistic) messages render first under a
    // temporary "pending-xxxx" id and get silently swapped to the real
    // server id by reconcileMessage() — the closure would still point
    // at the dead pending id, so a click would look up nothing and the
    // menu would silently fail to open until a refresh.
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const liveId = menuBtn.closest('.msg-row')?.dataset.messageId || messageId;
      const r = menuBtn.getBoundingClientRect();
      // Anchored open: horizontal + vertical placement both auto-flip to
      // whichever side has room — see openContextMenu()'s placement logic.
      openContextMenu(r.left, r.bottom, liveId, mine, { anchorTop: r.top, anchorBottom: r.bottom, anchorLeft: r.left, anchorRight: r.right });
    });
    row.appendChild(menuBtn);
  }

  return row;
}

/** Menu button for an outgoing (own/sent) message: a small floating
 *  button overlaid on the TOP-RIGHT corner of the bubble, hidden by
 *  default and only revealed on hover of the message row (no dedicated
 *  row/line is reserved for it — see .msg-header-menu-btn.own-floating
 *  CSS). This mirrors buildMsgHeaderRow()'s menu button for incoming
 *  messages, just without a name label or the extra line of height. */
function buildOwnMenuHeader(messageId) {
  const menuBtn = document.createElement('button');
  menuBtn.type = 'button';
  menuBtn.className = 'msg-header-menu-btn own own-floating';
  menuBtn.title = 'More options';
  menuBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
  // Same live-id fix as buildMsgHeaderRow() above — this is the button
  // that was actually reported broken (it's the one on YOUR OWN
  // messages, which are exactly the ones that go through the
  // pending-id -> real-id swap).
  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const liveId = menuBtn.closest('.msg-row')?.dataset.messageId || messageId;
    const r = menuBtn.getBoundingClientRect();
    openContextMenu(r.left, r.bottom, liveId, true, { anchorTop: r.top, anchorBottom: r.bottom, anchorLeft: r.left, anchorRight: r.right });
  });
  return menuBtn;
}

/** Builds the text bubble used both for a normal text-only message and
 *  for a message that has been deleted (tombstone) — same container
 *  shape (incl. the name/menu header for incoming messages, and the
 *  floating menu button for own messages) either way, so a message
 *  that arrives already-deleted from history and one that gets deleted
 *  live look identical. The reply quote (if any) is inserted directly
 *  after the header, before the message text, per the required order:
 *  Display Name -> Reply Preview -> Message Content. Shared by
 *  renderMessage() and applyDeletedState(). */
function buildTextOrTombstoneWrap(message, mine) {
  const wrapEl = document.createElement('div');
  wrapEl.className = 'msg-bubble-wrap' + (message.deletedForEveryone ? ' deleted' : '');
  if (!mine) {
    wrapEl.appendChild(buildMsgHeaderRow(message.from, message.id, mine, !message.deletedForEveryone));
  } else if (!message.deletedForEveryone) {
    wrapEl.appendChild(buildOwnMenuHeader(message.id));
  }
  const quoteEl = buildReplyQuoteEl(message);
  if (quoteEl) wrapEl.appendChild(quoteEl);
  const textBubbleEl = document.createElement('div');
  textBubbleEl.className = 'msg-text-content';
  renderBubbleText(textBubbleEl, message);
  wrapEl.appendChild(textBubbleEl);
  const bottom = buildBottomRow(message, mine);
  wrapEl.appendChild(bottom.row);
  return { wrapEl, textBubbleEl, statusEl: bottom.statusEl };
}

/** Hover-only action cluster that sits just outside the bubble,
 *  vertically centered on it, with transparent icons matching the
 *  composer's emoji button style. This now holds ONLY the quick-react
 *  trigger for BOTH incoming and own messages — the options/menu
 *  button lives inside each message's own container instead (see
 *  buildMsgHeaderRow / buildOwnMenuHeader), so the only things outside
 *  a message's container are the avatar (incoming) and this single
 *  reaction affordance. */
function buildHoverActions(messageId, mine) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-hover-actions';

  const emojiBtn = document.createElement('button');
  emojiBtn.type = 'button';
  emojiBtn.className = 'msg-hover-btn';
  emojiBtn.title = 'React';
  emojiBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 14.5c1 1.2 2.2 1.8 3.5 1.8s2.5-.6 3.5-1.8"/><line x1="8.5" y1="9.5" x2="8.5" y2="9.51"/><line x1="15.5" y1="9.5" x2="15.5" y2="9.51"/></svg>`;
  // FIX: same stale-closure issue as the menu buttons — resolve the id
  // live off the row's dataset rather than the captured `messageId`.
  emojiBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const liveId = emojiBtn.closest('.msg-row')?.dataset.messageId || messageId;
    openReactionPickerFor(liveId);
  });
  wrap.appendChild(emojiBtn);

  return wrap;
}

/**
 * Renders one message row. `opts.prepend` inserts it before `opts.anchor`
 * (used for infinite-scroll history); otherwise it's appended at the
 * bottom. Skips rendering entirely if the message was locally
 * "deleted for me".
 */
function renderMessage(message, opts) {
  opts = opts || {};
  if (deletedForMeIds.has(message.id)) return null;

  const mine = currentUser && message.fromId === currentUser.id;

  const atts = Array.isArray(message.attachments) ? message.attachments : [];
  const mediaAtts = atts.filter((a) => a.kind === 'image' || a.kind === 'video');
  const docAtts = atts.filter((a) => a.kind === 'document');
  const isDocOnly = !mediaAtts.length && !message.text && !message.deletedForEveryone && docAtts.length > 0;

  const col = document.createElement('div');
  col.className = 'msg-col';

  let textBubbleEl = null;
  let statusEl = null;
  let headerAdded = false; // ensures the name/menu header is only added once per message
  let quoteAdded = false;  // ensures the reply-quote is only inserted once per message

  // Media (+ optional caption) merged into a single WhatsApp-style bubble.
  if (!message.deletedForEveryone && mediaAtts.length) {
    const wrapEl = document.createElement('div');
    wrapEl.className = 'msg-bubble-wrap';

    if (!mine && !headerAdded) {
      wrapEl.appendChild(buildMsgHeaderRow(message.from, message.id, mine, true));
      headerAdded = true;
    } else if (mine) {
      wrapEl.appendChild(buildOwnMenuHeader(message.id));
      headerAdded = true;
    }

    // Reply preview goes directly after the name/header, before content.
    const quoteEl = buildReplyQuoteEl(message);
    if (quoteEl) { wrapEl.appendChild(quoteEl); quoteAdded = true; }

    const mediaWrap = document.createElement('div');
    mediaWrap.className = 'msg-media';
    mediaWrap.appendChild(buildMediaGrid(mediaAtts));
    wrapEl.appendChild(mediaWrap);

    if (message.text) {
      textBubbleEl = document.createElement('div');
      textBubbleEl.className = 'msg-text-content with-media';
      renderBubbleText(textBubbleEl, message);
      wrapEl.appendChild(textBubbleEl);
      const bottom = buildBottomRow(message, mine);
      wrapEl.appendChild(bottom.row);
      statusEl = bottom.statusEl;
    } else {
      const overlay = buildMediaTimeOverlay(message, mine);
      mediaWrap.appendChild(overlay.overlay);
      statusEl = overlay.statusEl;
    }
    col.appendChild(wrapEl);
  }

  if (!message.deletedForEveryone) {
    if (!mine && isDocOnly && !headerAdded) {
      col.appendChild(buildMsgHeaderRow(message.from, message.id, mine, true));
      headerAdded = true;
    }
    if (isDocOnly && !quoteAdded) {
      const quoteEl = buildReplyQuoteEl(message);
      if (quoteEl) { col.appendChild(quoteEl); quoteAdded = true; }
    }
    docAtts.forEach((att) => { col.appendChild(buildDocCard(att)); });
  }

  // Text-only bubble (no media) — also the tombstone bubble for a
  // deleted message. buildTextOrTombstoneWrap() takes care of the
  // in-container header AND the reply-quote placement (directly below
  // the name / at the top of own bubbles) for both incoming and own
  // messages either way.
  if (!mediaAtts.length && (message.deletedForEveryone || message.text)) {
    if (!headerAdded) headerAdded = true;
    const built = buildTextOrTombstoneWrap(message, mine);
    textBubbleEl = built.textBubbleEl;
    statusEl = built.statusEl;
    col.appendChild(built.wrapEl);
  } else if (!mediaAtts.length && !message.text && docAtts.length && !message.deletedForEveryone) {
    // Document-only message: no bubble to hang a timestamp on, so show
    // one small standalone time/ticks row underneath the doc card(s).
    const bottom = buildBottomRow(message, mine);
    bottom.row.style.marginTop = '2px';
    col.appendChild(bottom.row);
    statusEl = bottom.statusEl;
  }

  if (!message.deletedForEveryone && message.linkPreview) {
    renderLinkPreviewInto(col, message.linkPreview);
  }

  const reactionsEl = buildReactionBar(message, message.id);
  col.appendChild(reactionsEl);

  const row = document.createElement('div');
  // Deleted messages always keep their side based on who originally
  // sent them (mine -> right, incoming -> left), regardless of whether
  // they carry attachments/replyTo/text — a deleted incoming message
  // must never collapse into a "centered" row like a poll would.
  const shouldSideAlign = message.deletedForEveryone || message.replyTo || mediaAtts.length || docAtts.length || message.text;
  row.className = 'msg-row ' + (mine ? 'mine' : (shouldSideAlign ? 'theirs' : 'centered'));
  if (message.timestamp) row.dataset.timestamp = message.timestamp;
  row.dataset.messageId = message.id;
  row.dataset.searchText = [
    message.from || '',
    message.text || '',
    ...docAtts.map((a) => a.name || ''),
  ].join(' ').toLowerCase();

  if (mine) {
    row.appendChild(col);
  } else {
    const withAvatar = document.createElement('div');
    withAvatar.className = 'msg-with-avatar';
    const avatar = avatarNode(message.from, message.fromAvatar, 30);
    avatar.addEventListener('click', () => openProfilePopup(message));
    withAvatar.appendChild(avatar);
    withAvatar.appendChild(col);
    row.appendChild(withAvatar);
  }

  row.appendChild(buildHoverActions(message.id, mine));

  // Right-click (desktop) and long-press (touch) both open the same
  // context menu — see openContextMenu(). The header's own menu button
  // (both incoming and own messages, now that own messages carry their
  // own floating menu button too) opens the identical menu.
  row.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    openContextMenu(e.clientX, e.clientY, row.dataset.messageId, mine);
  });
  let longPressTimer = null;
  row.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    longPressTimer = setTimeout(() => openContextMenu(touch.clientX, touch.clientY, row.dataset.messageId, mine), 500);
  }, { passive: true });
  row.addEventListener('touchmove', () => clearTimeout(longPressTimer));
  row.addEventListener('touchend', () => clearTimeout(longPressTimer));

  const entry = { row, message, textBubbleEl, reactionsEl, statusEl, col };
  messagesById.set(message.id, entry);
  if (statusEl) updateStatusEl(entry);

  if (opts.prepend) {
    $('msgs').insertBefore(row, opts.anchor || null);
  } else {
    $('msgs').appendChild(row);
  }

  // Read receipts: watch other people's messages, mark read once
  // they're actually visible.
  if (!mine && !message.id.startsWith('pending-')) {
    readObserver.observe(row);
  }

  return row;
}

/* ── Read receipts via IntersectionObserver ── */
const readObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (!entry.isIntersecting) return;
    const id = entry.target.dataset.messageId;
    const data = messagesById.get(id);
    readObserver.unobserve(entry.target);
    if (!data || !currentUser) return;
    if (data.message.fromId === currentUser.id) return;
    if ((data.message.readBy || []).includes(currentUser.id)) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'mark_read', messageId: id }));
    }
  });
}, { root: $('msgs'), threshold: 0.6 });

/* ══════════════════════════════════════════════════════
   Sending messages — optimistic render + ack reconciliation
   ══════════════════════════════════════════════════════ */
function dispatchMessage(text, attachments, replyToOverride) {
  attachments = attachments || [];
  if (!text && !attachments.length) return;

  const clientId = generateId();
  const reply = replyToOverride !== undefined ? replyToOverride : replyTarget;
  const replyTo = reply ? { id: reply.id, from: reply.from, textPreview: reply.textPreview, kind: reply.kind } : null;

  const localId = 'pending-' + clientId;
  const localMessage = {
    id: localId,
    clientId,
    fromId: currentUser.id,
    from: currentUser.username,
    fromAvatar: currentUser.avatarUrl || null,
    text,
    attachments,
    replyTo,
    reactions: {},
    edited: false,
    deletedForEveryone: false,
    readBy: [currentUser.id],
    timestamp: new Date().toISOString(),
    status: 'sending',
  };

  renderMessage(localMessage);
  scrollToBottom();
  pendingByClientId.set(clientId, localId);

  const payload = { type: 'message', text, attachments, clientId, replyToId: replyTo ? replyTo.id : null };
  pendingPayloads.set(clientId, payload);
  armAckTimeout(clientId, localId);
  transmit(clientId, localId, payload);

  if (replyToOverride === undefined) clearReplyTarget();
}
function armAckTimeout(clientId, localId) {
  clearTimeout(pendingTimeouts.get(clientId));
  const t = setTimeout(() => {
    if (pendingByClientId.has(clientId)) updateMessageStatus(localId, 'failed');
  }, 8000);
  pendingTimeouts.set(clientId, t);
}
function transmit(clientId, localId, payload) {
  try {
    if (!ws || ws.readyState !== WebSocket.OPEN) throw new Error('not connected');
    ws.send(JSON.stringify(payload));
  } catch (e) {
    clearTimeout(pendingTimeouts.get(clientId));
    updateMessageStatus(localId, 'failed');
  }
}
function updateMessageStatus(id, status) {
  const entry = messagesById.get(id);
  if (!entry) return;
  entry.message.status = status;
  updateStatusEl(entry);
}
function retryMessage(localId) {
  const entry = messagesById.get(localId);
  if (!entry || !entry.message.clientId) return;
  const clientId = entry.message.clientId;
  const payload = pendingPayloads.get(clientId);
  if (!payload) return;
  updateMessageStatus(localId, 'sending');
  armAckTimeout(clientId, localId);
  transmit(clientId, localId, payload);
}
// Delegated click so the (re-rendered) status icon always works, even
// after updateStatusEl() replaces its innerHTML.
document.addEventListener('click', (e) => {
  const statusWrap = e.target.closest('.msg-status-wrap');
  if (!statusWrap) return;
  const row = statusWrap.closest('.msg-row');
  if (!row) return;
  const entry = messagesById.get(row.dataset.messageId);
  if (entry && entry.message.status === 'failed') retryMessage(row.dataset.messageId);
});

function reconcileMessage(localId, serverMessage, status) {
  const entry = messagesById.get(localId);
  if (!entry) return;
  messagesById.delete(localId);
  entry.row.dataset.messageId = serverMessage.id;
  entry.row.dataset.timestamp = serverMessage.timestamp;
  entry.message = Object.assign({}, serverMessage, { status });
  messagesById.set(serverMessage.id, entry);
  updateStatusEl(entry);
  rebuildDateSeparators();
}

/* ══════════════════════════════════════════════════════
   Reply preview bar
   ══════════════════════════════════════════════════════ */
function setReplyTarget(message) {
  replyTarget = {
    id: message.id,
    from: message.fromId === (currentUser && currentUser.id) ? 'Me(You)' : message.from,
    textPreview: message.deletedForEveryone ? 'This message was deleted.' : (message.text || attachmentSummaryLabel(message.attachments)).slice(0, 120),
    kind: (message.attachments && message.attachments.length) ? message.attachments[0].kind : 'text',
  };
  $('replyPreviewLabel').textContent = 'Replying to ' + replyTarget.from;
  $('replyPreviewText').textContent = replyTarget.textPreview;
  $('replyPreviewBar').style.display = 'flex';
  $('msgInput').focus();
}
function clearReplyTarget() {
  replyTarget = null;
  $('replyPreviewBar').style.display = 'none';
}
$('replyPreviewClose').addEventListener('click', clearReplyTarget);

/* ══════════════════════════════════════════════════════
   Jump-to-message (replies + pinned banner + search)
   ══════════════════════════════════════════════════════ */
function jumpToMessage(id) {
  const entry = messagesById.get(id);
  if (!entry) { appendSystem('That message is no longer loaded — scroll up to load older history.'); return; }
  entry.row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  entry.row.classList.add('flash-highlight');
  setTimeout(() => entry.row.classList.remove('flash-highlight'), 1600);
}

/* ══════════════════════════════════════════════════════
   Context menu (right-click / long-press on a message, or the
   in-container header menu button on either side)
   ══════════════════════════════════════════════════════ */
function openContextMenu(x, y, messageId, isMine, opts) {
  const entry = messagesById.get(messageId);
  if (!entry) return;
  const message = entry.message;
  opts = opts || {};

  const items = [];
  if (!message.deletedForEveryone && !messageId.startsWith('pending-')) {
    items.push({ label: 'Reply', action: 'reply' });
  }
  if (!message.deletedForEveryone) items.push({ label: 'Copy', action: 'copy' });
  if (!message.deletedForEveryone && !messageId.startsWith('pending-')) items.push({ label: 'React', action: 'react' });
  if (isMine && message.text && !message.deletedForEveryone) items.push({ label: 'Edit', action: 'edit' });
  if (!message.deletedForEveryone) items.push({ label: 'Delete for me', action: 'delete_me' });
  if ((isMine || isOwner) && !message.deletedForEveryone) items.push({ label: 'Delete for everyone', action: 'delete_everyone', danger: true });
  if (isOwner && !message.deletedForEveryone && !messageId.startsWith('pending-')) {
    const alreadyPinned = pinnedMessage && pinnedMessage.id === messageId;
    items.push({ label: alreadyPinned ? 'Unpin message' : 'Pin message', action: alreadyPinned ? 'unpin' : 'pin' });
  }
  if (!items.length) return; // nothing actionable (e.g. an already-deleted message) — don't show an empty menu

  contextMenuMessageId = messageId;
  const menu = $('contextMenu');
  menu.innerHTML = items.map((it) => `<button type="button" class="${it.danger ? 'danger' : ''}" data-action="${it.action}">${it.label}</button>`).join('');

  const menuWidth = 190, margin = 8;
  const estHeight = items.length * 38 + 20;

  // Vertical placement: drop down below the anchor by default, flip to
  // open upward if there isn't enough room beneath it.
  let top;
  if (opts.anchorTop !== undefined && opts.anchorBottom !== undefined) {
    const spaceBelow = window.innerHeight - opts.anchorBottom;
    if (spaceBelow < estHeight + 10 && opts.anchorTop > estHeight) {
      top = Math.max(margin, opts.anchorTop - estHeight - 6);
    } else {
      top = Math.min(opts.anchorBottom + 6, window.innerHeight - estHeight - margin);
    }
  } else {
    const spaceBelow = window.innerHeight - y;
    if (spaceBelow < estHeight + 10 && y > estHeight) {
      top = Math.max(margin, y - estHeight - 6);
    } else {
      top = Math.min(y + 4, window.innerHeight - estHeight - margin);
    }
  }

  // Horizontal placement: for anchored buttons (header/menu buttons —
  // used by BOTH incoming and own/sent messages), prefer right-aligning
  // the menu to the anchor's right edge (so it opens leftward, which is
  // usually the direction with more room since the button itself sits
  // near the right side of its bubble). If that would clip off the left
  // edge of the screen, flip to left-aligning with the anchor instead
  // (opens rightward). For a raw right-click / long-press point (no
  // anchor rect), prefer opening to the right of the cursor and flip
  // to the left of it if there isn't enough room. Either way the final
  // result is clamped to the viewport as a safety net.
  let left;
  if (opts.anchorLeft !== undefined && opts.anchorRight !== undefined) {
    const preferredLeft = opts.anchorRight - menuWidth;
    if (preferredLeft >= margin) {
      left = preferredLeft;
    } else if (opts.anchorLeft + menuWidth <= window.innerWidth - margin) {
      left = opts.anchorLeft;
    } else {
      left = Math.max(margin, Math.min(preferredLeft, window.innerWidth - menuWidth - margin));
    }
  } else {
    if (x + menuWidth + margin <= window.innerWidth) {
      left = x;
    } else {
      left = x - menuWidth;
    }
    left = Math.max(margin, Math.min(left, window.innerWidth - menuWidth - margin));
  }

  menu.style.left = left + 'px';
  menu.style.top = top + 'px';
  menu.classList.add('open');
}
function closeContextMenu() { $('contextMenu').classList.remove('open'); contextMenuMessageId = null; }
$('contextMenu').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const id = contextMenuMessageId;
  const entry = messagesById.get(id);
  const action = btn.dataset.action;
  closeContextMenu();
  if (!entry) return;

  if (action === 'reply') setReplyTarget(entry.message);
  else if (action === 'copy') copyMessageText(entry.message);
  else if (action === 'react') openReactionPickerFor(id);
  else if (action === 'edit') beginEditMessage(id);
  else if (action === 'delete_me') deleteMessageForMe(id);
  else if (action === 'delete_everyone') confirmDeleteMessage(id);
  else if (action === 'pin') sendPinMessage(id);
  else if (action === 'unpin') sendUnpinMessage();
});
document.addEventListener('click', (e) => { if (!$('contextMenu').contains(e.target)) closeContextMenu(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeContextMenu(); });

/**
 * PHASE 2: Copy Messages — preserves formatting.
 * Writes both a plain-text and an HTML flavor to the clipboard via the
 * modern Clipboard API (ClipboardItem), so pasting into a rich text
 * target (email, Notion, Slack, Google Docs) keeps bold/italic/links,
 * while pasting into a plain text field just gets the raw text.
 */
function copyMessageText(message) {
  const text = message.text || '';
  if (!text) return;
  const html = renderMarkdownSafe(text);

  if (navigator.clipboard && window.ClipboardItem) {
    const item = new ClipboardItem({
      'text/plain': new Blob([text], { type: 'text/plain' }),
      'text/html': new Blob([html], { type: 'text/html' }),
    });
    navigator.clipboard.write([item]).catch(() => {
      if (navigator.clipboard.writeText) navigator.clipboard.writeText(text).catch(() => {});
    });
  } else if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => {});
  }
}

/* ══════════════════════════════════════════════════════
   Edit / Delete
   ══════════════════════════════════════════════════════ */
function beginEditMessage(id) {
  const entry = messagesById.get(id);
  if (!entry || !entry.textBubbleEl || !currentUser || entry.message.fromId !== currentUser.id) return;

  const bubble = entry.textBubbleEl;
  const original = entry.message.text;
  bubble.innerHTML = '';
  const input = document.createElement('textarea');
  input.className = 'edit-input';
  input.rows = 1;
  input.value = original;
  bubble.appendChild(input);
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);

  let settled = false;
  function commit() {
    if (settled) return;
    settled = true;
    const val = input.value.trim();
    if (val && val !== original && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'edit_message', messageId: id, text: val }));
    } else {
      renderBubbleText(bubble, entry.message);
    }
  }
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { settled = true; renderBubbleText(bubble, entry.message); }
  });
  input.addEventListener('blur', commit);
}

function deleteMessageForMe(id) {
  const entry = messagesById.get(id);
  if (!entry) return;
  deletedForMeIds.add(id);
  persistDeletedForMe();
  entry.row.remove();
  messagesById.delete(id);
  rebuildDateSeparators();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'delete_message', messageId: id, scope: 'me' }));
  }
}

async function confirmDeleteMessage(id) {
  const confirmed = await openConfirmModal('Delete this message?', 'This will remove the message for everyone in the room. This action cannot be undone.', 'Delete');
  if (!confirmed) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'delete_message', messageId: id, scope: 'everyone' }));
  }
}

/** Rebuilds a message's container as a tombstone in place, and makes sure
 *  the row stays on its ORIGINAL sender's side (right for your own
 *  deleted messages, left for anyone else's) regardless of who performed
 *  the delete — deleted incoming messages must never end up centered or
 *  on the wrong side. */
function applyDeletedState(entry) {
  entry.message.deletedForEveryone = true;
  entry.message.text = '';
  entry.message.attachments = [];
  entry.message.reactions = {};

  const mine = currentUser && entry.message.fromId === currentUser.id;

  // Ensure correct side alignment: incoming deleted messages must stay
  // on the left ('theirs'), own deleted messages stay on the right
  // ('mine'), even if the row was previously rendered as 'centered'
  // (e.g. a text-less/attachment-less message).
  entry.row.classList.remove('centered', 'mine', 'theirs');
  entry.row.classList.add(mine ? 'mine' : 'theirs');

  const col = entry.row.querySelector('.msg-col');
  if (col) {
    Array.from(col.children).forEach((child) => {
      if (child === entry.reactionsEl) return;
      child.remove();
    });
    const built = buildTextOrTombstoneWrap(entry.message, mine);
    entry.textBubbleEl = built.textBubbleEl;
    entry.statusEl = built.statusEl;
    col.insertBefore(built.wrapEl, entry.reactionsEl);
    if (entry.statusEl) updateStatusEl(entry);
  }

  entry.reactionsEl.innerHTML = '';
  entry.reactionsEl.style.display = 'none';
}

/* ══════════════════════════════════════════════════════
   Search (over currently loaded / rendered messages)
   ══════════════════════════════════════════════════════ */
let searchMatches = [];
let searchIndex = -1;
function runSearch(query) {
  document.querySelectorAll('.msg-row.search-active').forEach((el) => el.classList.remove('search-active'));
  searchMatches = [];
  searchIndex = -1;
  if (!query) { $('searchCount').textContent = ''; return; }
  const q = query.toLowerCase();
  document.querySelectorAll('#msgs .msg-row[data-search-text]').forEach((row) => {
    if (row.dataset.searchText.includes(q)) searchMatches.push(row);
  });
  if (!searchMatches.length) { $('searchCount').textContent = 'No results'; return; }
  searchIndex = 0;
  focusSearchMatch();
}
function focusSearchMatch() {
  document.querySelectorAll('.msg-row.search-active').forEach((el) => el.classList.remove('search-active'));
  const row = searchMatches[searchIndex];
  if (!row) return;
  row.classList.add('search-active');
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  $('searchCount').textContent = `${searchIndex + 1} / ${searchMatches.length}`;
}
$('searchToggleBtn').addEventListener('click', () => {
  const bar = $('searchBar');
  const open = bar.style.display !== 'flex';
  bar.style.display = open ? 'flex' : 'none';
  if (open) { $('searchInput').focus(); } else { $('searchInput').value = ''; runSearch(''); }
});
$('searchInput').addEventListener('input', (e) => runSearch(e.target.value.trim()));
$('searchNextBtn').addEventListener('click', () => { if (!searchMatches.length) return; searchIndex = (searchIndex + 1) % searchMatches.length; focusSearchMatch(); });
$('searchPrevBtn').addEventListener('click', () => { if (!searchMatches.length) return; searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length; focusSearchMatch(); });
$('searchCloseBtn').addEventListener('click', () => { $('searchBar').style.display = 'none'; $('searchInput').value = ''; runSearch(''); });

/* ══════════════════════════════════════════════════════
   TYPING INDICATOR
   ══════════════════════════════════════════════════════ */
const typingUsers = new Map(); // userId -> { username, avatarUrl, timer }
let myTypingActive = false;
let myTypingTimer = null;

function sendTyping(isTyping) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'typing', isTyping }));
}
function stopMyTyping() {
  clearTimeout(myTypingTimer);
  if (myTypingActive) { myTypingActive = false; sendTyping(false); }
}
function renderTypingIndicator() {
  const el = $('typingIndicator');
  const list = Array.from(typingUsers.values());
  if (!list.length) { el.style.display = 'none'; return; }
  el.style.display = 'flex';

  const avatarsEl = $('typingAvatars');
  avatarsEl.innerHTML = '';
  list.slice(0, 3).forEach((u) => avatarsEl.appendChild(avatarNode(u.username, u.avatarUrl, 20)));

  const names = list.map((u) => u.username);
  let text;
  if (names.length === 1) text = `${names[0]} is typing`;
  else if (names.length === 2) text = `${names[0]} and ${names[1]} are typing`;
  else if (names.length === 3) text = `${names[0]}, ${names[1]} and ${names[2]} are typing`;
  else text = `${names[0]}, ${names[1]} +${names.length - 2} typing`;
  $('typingText').textContent = text;
}
function handleTypingEvent(msg) {
  if (!currentUser || msg.userId === currentUser.id) return;
  const existing = typingUsers.get(msg.userId);
  if (existing) clearTimeout(existing.timer);

  if (msg.isTyping) {
    const timer = setTimeout(() => { typingUsers.delete(msg.userId); renderTypingIndicator(); }, 4000);
    typingUsers.set(msg.userId, { username: msg.username, avatarUrl: msg.avatarUrl, timer });
  } else {
    typingUsers.delete(msg.userId);
  }
  renderTypingIndicator();
}
function clearAllTyping() {
  typingUsers.forEach((u) => clearTimeout(u.timer));
  typingUsers.clear();
  renderTypingIndicator();
}

/* ══════════════════════════════════════════════════════
   PHASE 2: MEDIA VIEWER — image gallery (prev/next, keyboard,
   swipe, zoom/pan) + video (fullscreen, PiP, remembered volume)
   ══════════════════════════════════════════════════════ */
let galleryItems = [];
let galleryIndex = 0;
const VOLUME_KEY = 'chat_video_volume';

function openLightbox(mediaAtts, startIndex) {
  galleryItems = (mediaAtts || []).slice();
  galleryIndex = startIndex || 0;
  renderLightbox();
  $('lightbox').classList.add('open');
  document.addEventListener('keydown', onLightboxKeydown);
}
function closeLightboxViewer() {
  $('lightbox').classList.remove('open');
  $('lightboxContent').innerHTML = '';
  document.removeEventListener('keydown', onLightboxKeydown);
  galleryItems = [];
}
function onLightboxKeydown(e) {
  if (e.key === 'Escape') closeLightboxViewer();
  else if (e.key === 'ArrowLeft') stepGallery(-1);
  else if (e.key === 'ArrowRight') stepGallery(1);
}
function stepGallery(dir) {
  if (galleryItems.length < 2) return;
  galleryIndex = (galleryIndex + dir + galleryItems.length) % galleryItems.length;
  renderLightbox();
}

function renderLightbox() {
  const content = $('lightboxContent');
  content.innerHTML = '';
  const att = galleryItems[galleryIndex];
  if (!att) return;

  const stage = document.createElement('div');
  stage.className = 'lightbox-stage';

  const spinner = document.createElement('div');
  spinner.className = 'lightbox-spinner';
  spinner.innerHTML = ringSvg(0, true);
  stage.appendChild(spinner);

  if (galleryItems.length > 1) {
    const counter = document.createElement('div');
    counter.className = 'lightbox-counter';
    counter.textContent = `${galleryIndex + 1} / ${galleryItems.length}`;
    stage.appendChild(counter);

    const prev = document.createElement('button');
    prev.className = 'lightbox-nav prev'; prev.innerHTML = '‹'; prev.title = 'Previous (←)';
    prev.addEventListener('click', (e) => { e.stopPropagation(); stepGallery(-1); });
    stage.appendChild(prev);

    const next = document.createElement('button');
    next.className = 'lightbox-nav next'; next.innerHTML = '›'; next.title = 'Next (→)';
    next.addEventListener('click', (e) => { e.stopPropagation(); stepGallery(1); });
    stage.appendChild(next);
  }

  if (att.kind === 'image') {
    const img = document.createElement('img');
    img.src = att.url;
    img.style.opacity = '0'; img.style.transition = 'opacity .2s ease';
    img.onload = () => { img.style.opacity = '1'; spinner.remove(); };
    stage.appendChild(img);
    attachImageZoomPan(img, stage);
    attachSwipeNav(stage);
  } else {
    const vid = document.createElement('video');
    vid.src = att.url; vid.controls = true; vid.autoplay = true;
    const savedVolume = parseFloat(localStorage.getItem(VOLUME_KEY));
    vid.volume = isFinite(savedVolume) ? Math.min(Math.max(savedVolume, 0), 1) : 1;
    vid.addEventListener('volumechange', () => {
      try { localStorage.setItem(VOLUME_KEY, String(vid.volume)); } catch (e) { /* ignore */ }
    });
    vid.oncanplay = () => spinner.remove();
    stage.appendChild(vid);

    const controls = document.createElement('div');
    controls.className = 'lightbox-video-controls';

    const fsBtn = document.createElement('button');
    fsBtn.className = 'lightbox-video-btn'; fsBtn.title = 'Fullscreen';
    fsBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>`;
    fsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (vid.requestFullscreen) vid.requestFullscreen();
      else if (vid.webkitEnterFullscreen) vid.webkitEnterFullscreen(); // iOS Safari
    });
    controls.appendChild(fsBtn);

    if (document.pictureInPictureEnabled) {
      const pipBtn = document.createElement('button');
      pipBtn.className = 'lightbox-video-btn'; pipBtn.title = 'Picture-in-Picture';
      pipBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><rect x="12" y="12" width="8" height="6" rx="1" fill="currentColor"/></svg>`;
      pipBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          if (document.pictureInPictureElement) await document.exitPictureInPicture();
          else await vid.requestPictureInPicture();
        } catch (err) { /* PiP not available for this video right now — ignore */ }
      });
      controls.appendChild(pipBtn);
    }
    stage.appendChild(controls);
  }

  content.appendChild(stage);
}

/** Wheel-to-zoom + drag-to-pan on the lightbox image. Double-click/tap
 *  toggles between 1x and 2.5x centered on the pointer. */
function attachImageZoomPan(img, stage) {
  let scale = 1, tx = 0, ty = 0;
  let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;

  function apply() {
    img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    img.classList.toggle('zoomed', scale > 1);
  }
  function clampPan() {
    const maxPan = 400 * (scale - 1);
    tx = Math.min(Math.max(tx, -maxPan), maxPan);
    ty = Math.min(Math.max(ty, -maxPan), maxPan);
  }

  img.addEventListener('wheel', (e) => {
    e.preventDefault();
    const prevScale = scale;
    scale = Math.min(Math.max(scale - e.deltaY * 0.0025, 1), 5);
    if (scale === 1) { tx = 0; ty = 0; }
    else if (prevScale !== scale) clampPan();
    apply();
  }, { passive: false });

  img.addEventListener('dblclick', () => {
    scale = scale > 1 ? 1 : 2.5;
    if (scale === 1) { tx = 0; ty = 0; }
    apply();
  });

  img.addEventListener('mousedown', (e) => {
    if (scale <= 1) return;
    dragging = true; img.classList.add('panning');
    startX = e.clientX; startY = e.clientY; startTx = tx; startTy = ty;
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    tx = startTx + (e.clientX - startX);
    ty = startTy + (e.clientY - startY);
    clampPan();
    apply();
  });
  window.addEventListener('mouseup', () => { dragging = false; img.classList.remove('panning'); });
}

/** Touch swipe left/right to navigate the gallery on mobile. Only fires
 *  as navigation if the image isn't currently zoomed in (so a pinch/pan
 *  gesture on a zoomed image doesn't also flip pages). */
function attachSwipeNav(stage) {
  let startX = 0, startY = 0, active = false;
  stage.addEventListener('touchstart', (e) => {
    const img = stage.querySelector('img');
    if (img && img.classList.contains('zoomed')) return;
    active = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
  }, { passive: true });
  stage.addEventListener('touchend', (e) => {
    if (!active) return;
    active = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) stepGallery(dx > 0 ? -1 : 1);
  }, { passive: true });
}

$('lightboxClose').addEventListener('click', closeLightboxViewer);
$('lightbox').addEventListener('click', (e) => { if (e.target.id === 'lightbox') closeLightboxViewer(); });

/* ══════════════════════════════════════════════════════
   PHASE 2: Drag & Drop / Clipboard Upload
   Dropping files anywhere over the chat column, or pasting
   (Ctrl+V) an image/file while the composer isn't already
   open, opens the same compose overlay used by the attach
   menu — one single upload pipeline for every entry point.
   ══════════════════════════════════════════════════════ */
function classifyFileForCompose(file) {
  if (file.type.startsWith('image/')) return 'image';
  if (file.type.startsWith('video/')) return 'video';
  return 'document';
}
function openComposeForFiles(files) {
  const items = files
    .filter((f) => f && f.size > 0)
    .map((f) => {
      const kind = classifyFileForCompose(f);
      if (f.size > ATTACH_LIMITS[kind]) {
        appendSystem(`⚠ "${f.name}" is too large for a ${kind} (max ${(ATTACH_LIMITS[kind] / (1024 * 1024)).toFixed(0)}MB)`);
        return null;
      }
      return { file: f, kind };
    })
    .filter(Boolean);
  if (items.length) openComposeOverlay(items);
}

(function setupDragAndDrop() {
  const col = $('chatCol');
  const overlay = $('dropOverlay');
  let dragCounter = 0;

  function isFileDrag(e) {
    return e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files');
  }

  col.addEventListener('dragenter', (e) => {
    if (!isFileDrag(e) || $('msgInput').disabled) return;
    e.preventDefault();
    dragCounter++;
    overlay.classList.add('active');
  });
  col.addEventListener('dragover', (e) => { if (isFileDrag(e)) e.preventDefault(); });
  col.addEventListener('dragleave', (e) => {
    if (!isFileDrag(e)) return;
    dragCounter = Math.max(0, dragCounter - 1);
    if (dragCounter === 0) overlay.classList.remove('active');
  });
  col.addEventListener('drop', (e) => {
    if (!isFileDrag(e)) return;
    e.preventDefault();
    dragCounter = 0;
    overlay.classList.remove('active');
    const files = Array.from(e.dataTransfer.files || []);
    if (files.length) openComposeForFiles(files);
  });
})();

document.addEventListener('paste', (e) => {
  if ($('msgInput').disabled) return;
  // Don't hijack a normal text paste into a focused text input/textarea
  // (e.g. pasting text into the edit-message box or the message input).
  const activeTag = (document.activeElement && document.activeElement.tagName) || '';
  const items = Array.from(e.clipboardData ? e.clipboardData.items : []);
  const fileItems = items.filter((it) => it.kind === 'file');
  if (!fileItems.length) return; // plain text paste — let the browser handle it normally

  if (activeTag === 'INPUT' || activeTag === 'TEXTAREA') {
    // Still allow pasting an actual screenshot/file even while the
    // composer input is focused — that's the whole point of Ctrl+V upload.
  }
  e.preventDefault();
  const files = fileItems.map((it) => it.getAsFile()).filter(Boolean);
  if (files.length) openComposeForFiles(files);
});

/* ══════════════════════════════════════════════════════
   Connection / lifecycle
   ══════════════════════════════════════════════════════ */
async function init() {
  try {
    const meRes = await fetch('/api/chat/me');
    if (meRes.status === 401) { window.location.href = '/login'; return; }
    const meData = await meRes.json();
    currentUser = meData.data;
  } catch (e) {
    showCenterMessage('Could not verify your session. Please log in again.', true);
    return;
  }
  connect();
}

function connect() {
  const proto = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
  ws = new WebSocket(proto + window.location.host + '/ws/chat');

  ws.onopen = () => {
    setConn('live', 'Connected');
    const password = sessionStorage.getItem('chat_room_password_' + roomId) || undefined;
    sessionStorage.removeItem('chat_room_password_' + roomId);
    ws.send(JSON.stringify({ type: 'join', roomId, password }));
  };

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch (e) { return; }

    switch (msg.type) {
      case 'joined': {
        isOwner = !!msg.room.is_owner;
        // NEW — capture the owner's username so the sidebar can render
        // the "Admin" badge next to them. Must happen before
        // updateUsersList() runs a few lines down.
        roomOwnerUsername = msg.room.owner_username || null;
        $('roomTitle').textContent = msg.room.room_name;
        $('deleteBtn').style.display = isOwner ? 'inline-flex' : 'none';
        $('searchToggleBtn').style.display = 'inline-flex';
        $('msgInput').disabled = false;
        $('sendBtn').disabled = false;
        $('emojiBtn').disabled = false;
        $('attachBtn').disabled = false;
        $('pollBtn').disabled = false;
        updateUsersList(msg.users || []);
        showChatUI();

        (msg.messages || []).forEach((m) => renderMessage(m));
        hasMoreHistory = !!msg.hasMoreHistory;
        earliestLoadedId = (msg.messages && msg.messages.length) ? msg.messages[0].id : null;
        rebuildDateSeparators();
        scrollToBottom();

        // Existing polls (with everyone's stored votes) come back on join —
        // this is what makes a poll survive the user leaving and returning.
        (msg.polls || []).forEach((p) => renderOrUpdatePoll(p));

        renderPinnedBanner(msg.pinned || null);

        $('msgInput').focus();
        break;
      }
      case 'system': appendSystem(msg.text); break;
      case 'user_list': updateUsersList(msg.users || []); break;

      case 'message': {
        const wasNearBottom = isNearBottom();
        renderMessage(msg.message);
        if (wasNearBottom) scrollToBottom();
        break;
      }

      case 'message_ack': {
        const localId = pendingByClientId.get(msg.clientId);
        clearTimeout(pendingTimeouts.get(msg.clientId));
        pendingTimeouts.delete(msg.clientId);
        pendingPayloads.delete(msg.clientId);
        pendingByClientId.delete(msg.clientId);
        if (localId) reconcileMessage(localId, msg.message, msg.status);
        break;
      }

      case 'message_edited': {
        const entry = messagesById.get(msg.message.id);
        if (entry) {
          entry.message.text = msg.message.text;
          entry.message.edited = true;
          entry.message.editedAt = msg.message.editedAt;
          if (entry.textBubbleEl) renderBubbleText(entry.textBubbleEl, entry.message);
          const meta = entry.row.querySelector('.msg-meta');
          if (meta && !meta.querySelector('.edited-tag')) {
            const tag = document.createElement('span');
            tag.className = 'edited-tag';
            tag.textContent = '(edited)';
            meta.appendChild(tag);
          }
          entry.row.dataset.searchText = [entry.message.from || '', entry.message.text || ''].join(' ').toLowerCase();
        }
        break;
      }

      case 'message_deleted': {
        if (msg.scope === 'me') break; // this client already hid it locally
        const entry = messagesById.get(msg.messageId);
        if (entry) applyDeletedState(entry);
        if (pinnedMessage && pinnedMessage.id === msg.messageId) renderPinnedBanner(null);
        break;
      }

      case 'reaction_update': {
        const entry = messagesById.get(msg.messageId);
        if (entry) {
          entry.message.reactions = msg.reactions;
          const fresh = buildReactionBar(entry.message, msg.messageId);
          entry.reactionsEl.replaceWith(fresh);
          entry.reactionsEl = fresh;
        }
        break;
      }

      case 'read_update': {
        const entry = messagesById.get(msg.messageId);
        if (entry) {
          entry.message.readBy = msg.readBy;
          if (currentUser && entry.message.fromId === currentUser.id && entry.message.status !== 'sending') {
            const othersRead = msg.readBy.filter((id) => id !== currentUser.id).length;
            updateMessageStatus(msg.messageId, othersRead > 0 ? 'read' : entry.message.status);
          }
        }
        break;
      }

      case 'pin_update': renderPinnedBanner(msg.message || null); break;

      // PHASE 2: server resolved (or failed to resolve) a link preview
      // for a message asynchronously after it was sent.
      case 'link_preview_update': {
        const entry = messagesById.get(msg.messageId);
        if (entry && entry.col) {
          entry.message.linkPreview = msg.linkPreview;
          renderLinkPreviewInto(entry.col, msg.linkPreview);
        }
        break;
      }

      case 'history': {
        loadingHistory = false;
        hasMoreHistory = msg.hasMore;
        if (msg.messages && msg.messages.length) {
          const container = $('msgs');
          const anchor = container.firstChild;
          const prevHeight = container.scrollHeight;
          msg.messages.forEach((m) => renderMessage(m, { prepend: true, anchor }));
          earliestLoadedId = msg.messages[0].id;
          rebuildDateSeparators();
          container.scrollTop = container.scrollHeight - prevHeight;
        }
        break;
      }

      case 'poll_update': renderOrUpdatePoll(msg.poll); break;
      case 'typing': handleTypingEvent(msg); break;
      case 'room_deleted':
        manualLeave = true;
        showCenterMessage(msg.message || 'This room was closed.', false);
        setTimeout(() => { window.location.href = '/chat'; }, 1800);
        break;
      case 'error':
        if (!$('layout') || $('layout').style.display === 'none') {
          showCenterMessage(msg.message || 'Unable to join this room.', true);
        } else {
          appendSystem('⚠ ' + msg.message);
        }
        break;
    }
  };

  ws.onclose = () => {
    setConn('bad', 'Disconnected');
    $('msgInput').disabled = true; $('sendBtn').disabled = true;
    $('emojiBtn').disabled = true; $('attachBtn').disabled = true; $('pollBtn').disabled = true;
    toggleEmojiPicker(false); toggleAttachMenu(false); clearAllTyping();
    if (!manualLeave) {
      appendSystem('Connection lost. Returning to the room list…');
      setTimeout(() => { window.location.href = '/chat'; }, 2000);
    }
  };
  ws.onerror = () => setConn('bad', 'Connection error');
}

function sendMessage() {
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text) return;
  stopMyTyping();
  dispatchMessage(text, []);
  input.value = '';
}

document.addEventListener('DOMContentLoaded', () => {
  buildEmojiPicker();
  buildMiniEmojiPopover();

  $('msgInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
  $('msgInput').addEventListener('input', () => {
    if ($('msgInput').disabled) return;
    if (!myTypingActive) { myTypingActive = true; sendTyping(true); }
    clearTimeout(myTypingTimer);
    myTypingTimer = setTimeout(() => { myTypingActive = false; sendTyping(false); }, 2500);
  });

  $('emojiBtn').addEventListener('click', (e) => { e.stopPropagation(); toggleEmojiPicker(); });
  $('attachBtn').addEventListener('click', (e) => { e.stopPropagation(); toggleAttachMenu(); });
  $('pollBtn').addEventListener('click', (e) => { e.stopPropagation(); openPollModal(); });

  document.addEventListener('click', (e) => {
    const picker = $('emojiPicker');
    if (picker.classList.contains('open') && !picker.contains(e.target) && e.target !== $('emojiBtn')) toggleEmojiPicker(false);
    const menu = $('attachMenu');
    if (menu.classList.contains('open') && !menu.contains(e.target) && e.target !== $('attachBtn')) toggleAttachMenu(false);
    const mini = $('miniEmojiPopover');
    if (mini.classList.contains('open') && !mini.contains(e.target) && !e.target.closest('.poll-emoji-btn') && !e.target.closest('.msg-hover-react')) closeMiniEmojiPopover();
  });

  init();
});

function leaveRoom() {
  manualLeave = true;
  stopMyTyping();
  if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ type: 'leave' })); ws.close(); }
  window.location.href = '/chat';
}

async function confirmDelete() {
  const confirmed = await openDeleteModal();
  if (!confirmed) return;
  modalDeleteBtn.disabled = true;
  modalDeleteBtn.textContent = 'Deleting…';
  if (ws && ws.readyState === WebSocket.OPEN) { manualLeave = true; ws.send(JSON.stringify({ type: 'delete_room' })); }
}

window.addEventListener('beforeunload', () => {
  if (ws && ws.readyState === WebSocket.OPEN) { manualLeave = true; ws.close(); }
});
</script>
</body>
