<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Room — cordEX Chat</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#000000; --surface:#0a0a0a; --surface2:#111111; --surface3:#161616;
    --border:#1a1a1a; --border2:#222222; --text:#ffffff; --text-2:#888888; --text-3:#444444;
    --blue:#3b82f6; --blue-dim:rgba(59,130,246,.12); --green:#22c55e; --red:#ef4444; --red-dim:rgba(239,68,68,.12);
    --amber:#f59e0b;
    --bubble-max:420px;
  }
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
  .topnav{height:60px;flex-shrink:0;background:rgba(0,0,0,.9);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;backdrop-filter:blur(12px);z-index:30;}
  .topnav-logo{font-size:1.05rem;font-weight:800;letter-spacing:-.5px;background:linear-gradient(90deg,#fff 0%,#93c5fd 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;flex-shrink:0;}
  .room-title-wrap{display:flex;flex-direction:column;overflow:hidden;}
  .room-title{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .room-sub{font-size:.7rem;color:var(--text-3);}
  .topnav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .nav-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:.8rem;font-weight:600;text-decoration:none;border:1px solid var(--border2);color:var(--text-2);background:transparent;cursor:pointer;transition:all .18s;}
  .nav-pill:hover{color:#fff;border-color:#444;background:var(--surface2);}
  .nav-pill.danger{border-color:rgba(239,68,68,.3);color:var(--red);}
  .nav-pill.danger:hover{background:rgba(239,68,68,.1);}
  .nav-pill.icon-only{padding:7px 9px;}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text-3);flex-shrink:0;}
  .conn-dot.live{background:var(--green);animation:pdot 1.5s infinite;}
  .conn-dot.bad{background:var(--red);}
  @keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

  .layout{flex:1;display:flex;overflow:hidden;position:relative;}
  .chat-col{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;}
  .msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px;}

  .msg-row{position:relative;display:flex;flex-direction:column;max-width:var(--bubble-max);scroll-margin:80px;}
  .msg-row.mine{align-self:flex-end;align-items:flex-end;}
  .msg-row.theirs{align-self:flex-start;align-items:flex-start;}
  .msg-row.centered{align-self:center;align-items:stretch;}
  .msg-row.search-active .msg-bubble{outline:2px solid var(--amber);outline-offset:1px;}
  .msg-row.flash-highlight .msg-bubble{animation:flashHighlight 1.6s ease;}
  @keyframes flashHighlight{0%,100%{box-shadow:none;}20%{box-shadow:0 0 0 3px rgba(59,130,246,.55);}}

  /* ── Avatars ── */
  .avatar-wrap{border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--surface3);cursor:pointer;}
  .avatar-img{width:100%;height:100%;object-fit:cover;display:block;}
  .avatar-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;}
  .msg-with-avatar{display:flex;gap:8px;align-items:flex-start;max-width:100%;}
  .msg-col{display:flex;flex-direction:column;min-width:0;max-width:var(--bubble-max);}

  .msg-meta{font-size:.7rem;color:var(--text-3);margin-bottom:3px;padding:0 3px;display:flex;align-items:center;gap:4px;}
  .msg-meta .edited-tag{font-style:italic;opacity:.8;}
  .msg-bubble{
    position:relative;
    width:fit-content;max-width:100%;min-width:56px;
    padding:9px 13px;border-radius:16px;font-size:.86rem;line-height:1.5;
    word-wrap:break-word;overflow-wrap:anywhere;white-space:pre-wrap;
  }
  .msg-row.mine .msg-bubble{background:var(--blue);color:#fff;border-bottom-right-radius:4px;}
  .msg-row.theirs .msg-bubble{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-bottom-left-radius:4px;}
  .msg-bubble.media-only{padding:3px;background:transparent!important;border:none!important;}
  .msg-bubble.deleted{font-style:italic;color:var(--text-2)!important;background:var(--surface2)!important;border:1px dashed var(--border2)!important;}
  .edit-input{width:100%;min-width:180px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:inherit;font:inherit;padding:6px 8px;resize:vertical;}

  /* ── WhatsApp-style single bubble: media (flush) + caption + time,
     all inside one rounded card instead of separate stacked bubbles. ── */
  .msg-bubble-wrap{position:relative;width:fit-content;max-width:100%;border-radius:16px;overflow:hidden;}
  .msg-row.mine .msg-bubble-wrap{background:var(--blue);color:#fff;border-bottom-right-radius:4px;}
  .msg-row.theirs .msg-bubble-wrap{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-bottom-left-radius:4px;}
  .msg-bubble-wrap.deleted{background:var(--surface2)!important;border:1px dashed var(--border2)!important;}
  .msg-bubble-wrap.deleted .msg-text-content{font-style:italic;color:var(--text-2)!important;}
  .msg-media{position:relative;display:block;line-height:0;}
  .msg-text-content{padding:9px 13px 0 13px;font-size:.86rem;line-height:1.45;word-wrap:break-word;overflow-wrap:anywhere;white-space:pre-wrap;}
  .msg-text-content.with-media{padding-top:6px;}
  .msg-bottom-row{display:flex;align-items:center;justify-content:flex-end;gap:4px;padding:0 13px 6px;margin-top:-15px;pointer-events:none;}
  .msg-bottom-row.no-text{padding-top:6px;margin-top:0;}
  /* NEW — "This message was deleted." is a single line that fills the
     whole bubble width (bubble is width:fit-content), so there is zero
     horizontal room for the timestamp to sit next to it. Pulling the
     row up by the shared -15px in that case drags it straight into the
     text. Rather than touching the shared value (which is tuned for
     normal wrapped text and works fine there), this higher-specificity
     rule (two classes) neutralizes the negative margin ONLY inside a
     deleted bubble, regardless of what -15px gets tuned to later. */
  .msg-bubble-wrap.deleted .msg-bottom-row{margin-top:0;padding-top:2px;}
  .msg-bottom-row .msg-status-wrap{pointer-events:auto;}
  .msg-time-text{font-size:.68rem;color:rgba(255,255,255,.7);white-space:nowrap;}
  .msg-row.theirs .msg-time-text{color:var(--text-3);}
  .edited-tag-inline{font-size:.68rem;font-style:italic;opacity:.75;white-space:nowrap;}
  .media-time-overlay{
    position:absolute;bottom:7px;right:9px;background:rgba(0,0,0,.55);color:#fff;
    font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:20px;
    display:flex;align-items:center;gap:3px;pointer-events:none;z-index:2;
  }
  .media-time-overlay .status-icon{width:13px;height:13px;color:rgba(255,255,255,.85);}
  .media-time-overlay .status-icon.read{color:#60a5fa;}

  /* ── In-container header row for incoming messages: sender name
     (top-left) + options/menu button (top-right), on the same row,
     living INSIDE the message bubble itself. Colored per sender so the
     black text/icon stay readable regardless of the (dark) bubble
     background beneath it. Own (sent) messages no longer render a
     dedicated header row/line at all — their menu button floats as an
     absolutely-positioned overlay in the corner of the bubble instead
     (see .msg-header-menu-btn.own-floating below), revealed on hover
     only, so it never consumes an extra line of vertical space. ── */
  .msg-header-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 10px 4px;}
  .msg-header-name{font-size:.78rem;font-weight:800;color:#000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
  .msg-header-menu-btn{
    flex-shrink:0;width:22px;height:22px;border-radius:50%;border:none;
    background:rgba(0,0,0,.14);color:#000;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,opacity .15s;
    opacity:0;
  }
  /* Hidden by default; revealed only while hovering the message row —
     applies to both incoming (in-row) and own (floating) buttons. */
  .msg-row:hover .msg-header-menu-btn{opacity:1;}
  .msg-header-menu-btn:hover{background:rgba(0,0,0,.26);}
  .msg-header-menu-btn.own{background:rgba(255,255,255,.18);color:#fff;}
  .msg-header-menu-btn.own:hover{background:rgba(255,255,255,.3);}
  .msg-header-menu-btn svg{width:14px;height:14px;stroke:currentColor;}
  /* Own (sent) message menu button: floats over the top-right corner of
     the bubble instead of occupying its own row/line. */
  .msg-header-menu-btn.own-floating{
    position:absolute;
    top:6px;right:6px;
    z-index:4;
  }

  .sys-row{align-self:center;font-size:.74rem;color:var(--text-3);background:var(--surface2);padding:5px 12px;border-radius:100px;margin:4px 0;}

  .date-separator{align-self:center;display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 4px;width:100%;}
  .date-separator span{font-size:.7rem;font-weight:700;color:var(--text-2);background:var(--surface2);border:1px solid var(--border2);padding:4px 12px;border-radius:100px;white-space:nowrap;}

  /* ── Reply quote (rendered directly below the sender name inside a
     message's own bubble container, above the message content) ── */
  .reply-quote{display:flex;flex-direction:column;gap:1px;padding:5px 9px;border-left:3px solid var(--blue);background:rgba(255,255,255,.06);border-radius:6px;margin-bottom:3px;cursor:pointer;max-width:100%;}
  .msg-row.mine .reply-quote{background:#000000;}
  .reply-quote:hover{background:rgba(255,255,255,.1);}
  .reply-quote-from{font-size:.72rem;font-weight:700;color:var(--blue);}
  .msg-row.mine .reply-quote-from{color:var(--blue);}
  .reply-quote-text{font-size:.76rem;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .msg-row.mine .reply-quote-text{color:#ffffff;}
  /* Small inset when nested inside a bubble wrap (below the name /
     below the top corner) so it doesn't butt up against the rounded
     bubble edges or the floating own menu button. */
  .msg-bubble-wrap .reply-quote{margin:4px 8px 0px;}
  .msg-bubble-wrap .reply-quote:first-child{margin-top:6px;}

  .msg-bubble-wrap .reply-quote{margin:4px 8px 0px;}
.msg-bubble-wrap .reply-quote:first-child{margin-top:6px;}
/* NEW — tighten the gap between the quote box and the real message
   text that follows it, so it matches the compact 1px gap already
   used *inside* the quote (name → quoted text). */
.msg-bubble-wrap .reply-quote + .msg-text-content{padding-top:3px;}
.msg-bubble-wrap .reply-quote{padding-bottom:4px;}

  /* ── Reply preview bar above the composer ── */
  .reply-preview-bar{display:none;align-items:center;gap:10px;padding:8px 16px;border-top:1px solid var(--border);background:var(--surface2);flex-shrink:0;}
  .reply-preview-bar{border-left:3px solid var(--blue);}
  .reply-preview-content{flex:1;min-width:0;display:flex;flex-direction:column;}
  .reply-preview-label{font-size:.72rem;font-weight:700;color:var(--blue);}
  .reply-preview-text{font-size:.78rem;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .reply-preview-close{background:none;border:none;color:var(--text-2);cursor:pointer;font-size:1rem;width:26px;height:26px;border-radius:50%;flex-shrink:0;}
  .reply-preview-close:hover{background:var(--surface3);color:#fff;}

  /* ── Reactions ── */
  .reaction-bar{display:flex;flex-wrap:wrap;justify-content:flex-start;gap:4px;margin-top:4px;}
  .msg-row.mine .reaction-bar{justify-content:flex-end;}
  .reaction-pill{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:2px 8px;font-size:.74rem;cursor:pointer;transition:all .12s;}
  .reaction-pill:hover{border-color:#555;}
  .reaction-pill.mine{background:var(--blue-dim);border-color:var(--blue);}
  .reaction-pill .r-count{color:var(--text-2);font-size:.7rem;}
  .reaction-pill.mine .r-count{color:#bfdbfe;}

  /* ── Hover action cluster (emoji react trigger) — sits outside the
     bubble, vertically centered on it, transparent icons matching the
     composer's emoji button style rather than a filled colored circle.
     The options/menu button no longer lives here for either side — it
     now lives inside each message's own container (see
     .msg-header-row / .msg-header-menu-btn.own-floating above), so
     this cluster is now just the quick-react trigger for both incoming
     and own messages. ── */
  .msg-hover-actions{
    opacity:0;transition:opacity .12s;position:absolute;top:50%;transform:translateY(-50%);
    display:flex;align-items:center;gap:1px;
  }
  .msg-row.mine .msg-hover-actions{left:-38px;}
  .msg-row.theirs .msg-hover-actions{right:-38px;}
  .msg-row:hover .msg-hover-actions{opacity:1;}
  .msg-hover-btn{
    width:28px;height:28px;border-radius:50%;background:transparent;border:none;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);
    transition:background .15s,color .15s;flex-shrink:0;
  }
  .msg-hover-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
  .msg-hover-btn svg{width:17px;height:17px;stroke:currentColor;}

  /* ── Message status ticks (own messages only) ── */
  .status-icon{width:14px;height:14px;flex-shrink:0;color:rgba(255,255,255,.6);}
  .status-icon.read{color:#60a5fa;}
  .status-icon.failed{color:var(--red);cursor:pointer;}
  .status-icon.spin{animation:spin .8s linear infinite;}

  /* ── Media grid ── */
  .media-grid{display:grid;gap:2px;width:var(--bubble-max);max-width:100%;border-radius:13px;overflow:hidden;}
  .media-grid.n1{width:280px;}
  .media-grid.n2{grid-template-columns:1fr 1fr;aspect-ratio:2/1;}
  .media-grid.n3{grid-template-columns:1.3fr 1fr;grid-template-rows:1fr 1fr;aspect-ratio:4/3;}
  .media-grid.n3 .media-tile:nth-child(1){grid-row:1/3;}
  .media-grid.n4plus{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;aspect-ratio:1/1;}

  .media-tile{position:relative;overflow:hidden;background:var(--surface2);cursor:pointer;}
  .media-grid.n1 .media-tile{aspect-ratio:1/1;}
  .media-tile .tile-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(14px) saturate(1.1);transform:scale(1.15);}
  .media-tile img,.media-tile video{position:relative;width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .35s ease;}
  .media-tile img.loaded,.media-tile video.loaded{opacity:1;}
  .media-tile .tile-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .media-tile.loaded .tile-spinner{display:none;}
  .media-tile .play-badge{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.5);
    display:flex;align-items:center;justify-content:center;color:#fff;pointer-events:none;
  }
  .media-tile .more-overlay{
    position:absolute;inset:0;background:rgba(0,0,0,.55);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;
  }
  .media-tile .duration-badge{
    position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.7);color:#fff;
    font-size:.68rem;font-weight:600;padding:2px 6px;border-radius:5px;pointer-events:none;letter-spacing:.02em;
  }

  .ring{width:34px;height:34px;transform:rotate(-90deg);}
  .ring circle{fill:none;stroke-width:3;}
  .ring .track{stroke:rgba(255,255,255,.25);}
  .ring .bar{stroke:#fff;stroke-linecap:round;transition:stroke-dashoffset .15s linear;}
  .ring.spin{animation:ringspin 1s linear infinite;}
  @keyframes ringspin{to{transform:rotate(270deg)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── WhatsApp-style document card ── */
  .doc-card{
    display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:13px;
    background:rgba(255,255,255,.05);border:1px solid var(--border2);color:inherit;
    text-decoration:none;max-width:280px;width:280px;margin-bottom:4px;transition:background .15s,border-color .15s;
  }
  .doc-card:hover{background:rgba(255,255,255,.09);border-color:#3a3a3a;}
  .doc-icon{
    width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;color:#fff;font-size:.62rem;font-weight:800;letter-spacing:.02em;
  }
  .doc-icon.pdf{background:#e53e3e;}
  .doc-icon.doc{background:#2b6cb0;}
  .doc-icon.txt{background:#718096;}
  .doc-icon.generic{background:#4a5568;}
  .doc-info{display:flex;flex-direction:column;overflow:hidden;min-width:0;flex:1;}
  .doc-name{font-size:.84rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .doc-meta{font-size:.72rem;color:var(--text-2);margin-top:2px;}
  .doc-download{
    margin-left:auto;flex-shrink:0;width:30px;height:30px;border-radius:50%;
    background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:var(--text-2);
  }
  .doc-card:hover .doc-download{color:#fff;}
  .doc-card.preview-only{cursor:default;}
  .doc-card.preview-only:hover{background:rgba(255,255,255,.05);}

  .input-row{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;position:relative;align-items:flex-end;}
  .chat-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:#fff;font-size:.87rem;padding:11px 14px;outline:none;}
  .chat-input:focus{border-color:#444;}

  /* Horizontal send button (0°, not diagonal) */
  .chat-send{background:var(--blue);border:none;border-radius:50%;width:42px;height:42px;padding:0;color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .chat-send:hover:not(:disabled){background:#2563eb;}
  .chat-send:disabled{opacity:.4;cursor:not-allowed;}
  .chat-send svg{width:19px;height:19px;}

  /* Tighten the space between message text and the timestamp/ticks row
   that follows it — the general .msg-text-content padding (9px bottom)
   was built for the case where nothing sits under it, but now that
   .msg-bottom-row always sits directly underneath, that bottom padding
   is redundant and stacks with the row's own spacing. */

   .msg-text-content .md-content p:empty{display:none;}

  .emoji-btn{
    flex-shrink:0;width:42px;height:42px;border-radius:8px;border:1px solid var(--border2);
    background:var(--surface2);color:var(--text-2);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .18s;
  }
  .emoji-btn svg{width:20px;height:20px;stroke:currentColor;}
  .emoji-btn:hover{color:#fff;border-color:#444;background:var(--surface3);}
  .emoji-btn.active{color:var(--blue);border-color:var(--blue);background:var(--blue-dim);}
  .emoji-btn:disabled{opacity:.4;cursor:not-allowed;}

  .emoji-picker{
    position:absolute;bottom:64px;left:20px;width:290px;max-height:260px;overflow-y:auto;
    background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
    padding:10px;display:none;flex-direction:column;gap:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:20;
  }
  .emoji-picker.open{display:flex;}
  .emoji-group-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:2px 2px 0;}
  .emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .emoji-grid button{background:none;border:none;font-size:1.25rem;line-height:1;padding:6px 0;border-radius:6px;cursor:pointer;transition:background .15s;}
  .emoji-grid button:hover{background:var(--surface3);}

  /* ── Attach menu (plus button) — plain outline icons, no colors/sizes ── */
  .attach-menu{
    position:absolute;bottom:64px;left:20px;width:190px;
    background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
    padding:6px;display:none;flex-direction:column;gap:2px;
    box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:20;
  }
  .attach-menu.open{display:flex;}
  .attach-menu button{display:flex;align-items:center;gap:10px;padding:9px 10px;border:none;background:none;color:var(--text);font-size:.83rem;text-align:left;border-radius:7px;cursor:pointer;}
  .attach-menu button:hover{background:var(--surface3);}
  .attach-menu button svg{width:18px;height:18px;stroke:var(--text-2);flex-shrink:0;}
  .attach-menu button:hover svg{stroke:#fff;}

  /* ── Right-click / long-press context menu on a message ── */
  .context-menu{
    position:fixed;width:190px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
    padding:6px;display:none;flex-direction:column;gap:1px;box-shadow:0 8px 24px rgba(0,0,0,.55);z-index:1200;
  }
  .context-menu.open{display:flex;}
  .context-menu button{display:block;width:100%;text-align:left;padding:9px 10px;border:none;background:none;color:var(--text);font-size:.83rem;border-radius:7px;cursor:pointer;}
  .context-menu button:hover{background:var(--surface3);}
  .context-menu button.danger{color:var(--red);}
  .context-menu button.danger:hover{background:var(--red-dim);}

  /* ── Pinned message banner ── */
  .pinned-banner{display:none;align-items:center;gap:10px;padding:9px 20px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;flex-shrink:0;}
  .pinned-banner:hover{background:var(--surface3);}
  .pinned-banner svg{width:16px;height:16px;color:var(--amber);flex-shrink:0;}
  .pinned-text{flex:1;min-width:0;font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-2);}
  .pinned-unpin{background:none;border:none;color:var(--text-2);cursor:pointer;width:26px;height:26px;border-radius:50%;flex-shrink:0;}
  .pinned-unpin:hover{background:var(--surface3);color:#fff;}

  /* ── Search bar ── */
  .search-bar{display:none;align-items:center;gap:8px;padding:10px 20px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
  .search-bar input{flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;color:#fff;font-size:.84rem;padding:8px 12px;outline:none;}
  .search-bar input:focus{border-color:#444;}
  .search-count{font-size:.76rem;color:var(--text-2);white-space:nowrap;min-width:64px;text-align:center;}
  .search-bar button{background:var(--surface3);border:1px solid var(--border2);border-radius:7px;color:var(--text-2);width:30px;height:30px;cursor:pointer;flex-shrink:0;}
  .search-bar button:hover{color:#fff;border-color:#444;}

  .compose-overlay{
    position:absolute;inset:0;background:#000;display:none;flex-direction:column;z-index:40;
  }
  .compose-overlay.open{display:flex;}
  .compose-top{height:56px;flex-shrink:0;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--border);}
  .compose-close{background:none;border:none;color:var(--text-2);cursor:pointer;font-size:1.3rem;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .compose-close:hover{background:var(--surface2);color:#fff;}
  .compose-count{font-size:.85rem;color:var(--text-2);}
  .compose-main{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:16px;position:relative;}
  .compose-main img,.compose-main video{max-width:100%;max-height:100%;border-radius:10px;object-fit:contain;}
  .compose-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.1rem;}
  .compose-nav.prev{left:16px;} .compose-nav.next{right:16px;}
  .compose-thumbs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;flex-shrink:0;}
  .compose-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;border:2px solid transparent;opacity:.55;}
  .compose-thumb.active{opacity:1;border-color:var(--blue);}
  .compose-bottom{display:flex;gap:10px;padding:12px 16px;align-items:center;border-top:1px solid var(--border);flex-shrink:0;}
  .compose-caption{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:22px;color:#fff;font-size:.87rem;padding:11px 16px;outline:none;}
  .compose-send{width:42px;height:42px;border-radius:50%;background:var(--blue);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .compose-send:disabled{opacity:.5;cursor:not-allowed;}
  .compose-send svg{width:19px;height:19px;}

  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:2000;opacity:0;pointer-events:none;transition:opacity .18s ease;overflow:hidden;}
  .lightbox.open{opacity:1;pointer-events:auto;}
  .lightbox-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;touch-action:none;}
  .lightbox img,.lightbox video{max-width:92vw;max-height:88vh;border-radius:6px;box-shadow:0 20px 60px rgba(0,0,0,.6);user-select:none;-webkit-user-drag:none;}
  .lightbox img{cursor:zoom-in;transition:transform .08s ease-out;}
  .lightbox img.zoomed{cursor:grab;}
  .lightbox img.panning{cursor:grabbing;transition:none;}
  .lightbox-close{position:absolute;top:18px;right:22px;background:rgba(255,255,255,.08);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:1.2rem;cursor:pointer;z-index:5;}
  .lightbox-close:hover{background:rgba(255,255,255,.18);}
  .lightbox-spinner{position:absolute;}
  .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:none;color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:1.3rem;z-index:5;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .lightbox-nav:hover{background:rgba(255,255,255,.2);}
  .lightbox-nav.prev{left:18px;} .lightbox-nav.next{right:18px;}
  .lightbox-counter{position:absolute;top:22px;left:22px;color:rgba(255,255,255,.7);font-size:.8rem;font-weight:600;background:rgba(255,255,255,.08);padding:5px 12px;border-radius:100px;z-index:5;}
  .lightbox-video-controls{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:5;}
  .lightbox-video-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .lightbox-video-btn:hover{background:rgba(255,255,255,.22);}
  .lightbox-video-btn svg{width:17px;height:17px;}

  .sidebar{width:220px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;padding:18px 16px;}
  .sidebar h4{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:12px;}
  .user-item{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:.83rem;}
  .user-item .avatar-wrap{width:24px;height:24px;}
  .user-item .avatar-fallback{font-size:.65rem;}
  .user-item .user-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .user-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;margin-left:auto;}

  /* ── Admin badge — sidebar ONLY (per requirement), next to the room
     owner's name in the online-users list. Not rendered in message
     headers. Sits between the name and the presence dot; if it's
     showing, the presence dot naturally moves further right, which is
     fine since both are flex-shrink:0. */
     
  .admin-badge{
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;

    padding: 0px 5px;      /* Smaller padding */
    border-radius: 100px;

    background: transparent;
    border: 1px solid #07e655;

    color: #07e655;
    font-size: .5rem;      /* Smaller text */
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .02em; /* Slightly tighter spacing */
    margin-left: 4px;      /* Less gap from the username */
    line-height: 1.2;
  }

  /* ── Typing indicator ── */
  .typing-indicator{display:none;align-items:center;gap:8px;padding:6px 20px;font-size:.78rem;color:var(--text-2);border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .typing-avatars{display:flex;align-items:center;}
  .typing-avatars .avatar-wrap{width:20px;height:20px;margin-left:-7px;border:2px solid var(--surface);}
  .typing-avatars .avatar-wrap:first-child{margin-left:0;}
  .typing-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .typing-dots{display:inline-flex;gap:3px;flex-shrink:0;}
  .typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--text-2);animation:typingBounce 1.2s infinite ease-in-out;}
  .typing-dots span:nth-child(2){animation-delay:.15s;}
  .typing-dots span:nth-child(3){animation-delay:.3s;}
  @keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-3px);opacity:1;}}

  .center-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--text-2);font-size:.9rem;text-align:center;padding:40px;}
  .spinner{width:22px;height:22px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
  .history-spinner{align-self:center;padding:6px;}

  ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .18s ease;}
  .modal-overlay.open{opacity:1;pointer-events:auto;}
  .modal-card{width:100%;max-width:380px;margin:0 20px;background:var(--surface2);border:1px solid var(--border2);border-radius:16px;padding:26px 26px 22px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);transform:translateY(8px) scale(.97);transition:transform .18s ease;}
  .modal-overlay.open .modal-card{transform:translateY(0) scale(1);}
  .modal-icon{width:52px;height:52px;margin:0 auto 16px;border-radius:50%;background:var(--red-dim);border:1px solid rgba(239,68,68,.3);display:flex;align-items:center;justify-content:center;color:var(--red);}
  .modal-icon svg{width:24px;height:24px;}
  .modal-title{font-size:1.05rem;font-weight:700;letter-spacing:-.2px;margin-bottom:8px;}
  .modal-text{font-size:.85rem;color:var(--text-2);line-height:1.55;margin-bottom:22px;}
  .modal-actions{display:flex;gap:10px;}
  .modal-btn{flex:1;padding:11px 0;border-radius:9px;font-size:.86rem;font-weight:700;cursor:pointer;border:1px solid var(--border2);transition:all .15s;}
  .modal-btn-cancel{background:var(--surface3);color:var(--text-2);}
  .modal-btn-cancel:hover{background:#ffffff;color:#000000;border-color:#ffffff;}
  .modal-btn-delete{background:var(--red);color:#fff;border-color:var(--red);}
  .modal-btn-delete:hover{background:#dc2626;border-color:#dc2626;}
  .modal-btn:disabled{opacity:.5;cursor:not-allowed;}

  /* ── Poll creation modal ── */
  .poll-modal-card{max-width:420px;text-align:left;}
  .poll-q-row{display:flex;gap:6px;margin-bottom:14px;align-items:stretch;}
  .poll-q-input{width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:#fff;font-size:.85rem;outline:none;}
  .poll-q-row .poll-q-input{margin-bottom:0;flex:1;}
  .poll-q-input:focus{border-color:#444;}
  .poll-options-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:260px;overflow-y:auto;}
  .poll-option-input-row{display:flex;gap:6px;align-items:center;}
  .poll-option-input{flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:#fff;font-size:.82rem;outline:none;}
  .poll-option-input:focus{border-color:#444;}
  .poll-option-remove{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:1rem;width:26px;height:26px;flex-shrink:0;border-radius:6px;}
  .poll-option-remove:hover{color:var(--red);background:var(--red-dim);}
  .poll-add-option-btn{width:100%;justify-content:center;margin-bottom:18px;}

  /* Single shared, transparent emoji trigger for the whole poll modal —
     inserts into whichever question/option field the user last focused,
     instead of every field having its own icon. */
  .poll-emoji-toggle-btn{
    flex-shrink:0;width:30px;height:30px;border-radius:50%;border:none;
    background:transparent;color:var(--text-2);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .15s;
  }
  .poll-emoji-toggle-btn svg{width:18px;height:18px;stroke:currentColor;}
  .poll-emoji-toggle-btn:hover{color:#fff;background:rgba(255,255,255,.08);}
  .poll-emoji-toggle-btn.active{color:var(--blue);background:var(--blue-dim);}

  .mini-emoji-popover{
    position:fixed;width:232px;max-height:200px;overflow-y:auto;
    background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
    padding:8px;display:none;z-index:1100;box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  .mini-emoji-popover.open{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .mini-emoji-popover button{background:none;border:none;font-size:1.1rem;line-height:1;padding:6px 0;border-radius:6px;cursor:pointer;}
  .mini-emoji-popover button:hover{background:var(--surface3);}

  /* ── Poll card (rendered inline in the chat feed) — single-select ── */
  .poll-card{width:290px;max-width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:14px;}
  .poll-question{font-size:.88rem;font-weight:700;margin-bottom:10px;line-height:1.4;}
  .poll-options{display:flex;flex-direction:column;gap:6px;}
  .poll-option{position:relative;overflow:hidden;text-align:left;width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;cursor:pointer;color:var(--text);font-size:.8rem;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .poll-option:hover{border-color:#444;}
  .poll-option-fill{position:absolute;left:0;top:0;bottom:0;background:var(--blue-dim);transition:width .25s ease;z-index:0;}
  .poll-option-text{position:relative;z-index:1;display:flex;align-items:center;gap:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .poll-option-radio{position:relative;z-index:1;flex-shrink:0;width:14px;height:14px;border-radius:50%;border:1.5px solid var(--text-3);display:flex;align-items:center;justify-content:center;}
  .poll-option-radio::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--blue);opacity:0;transition:opacity .15s;}
  .poll-option.voted .poll-option-radio{border-color:var(--blue);}
  .poll-option.voted .poll-option-radio::after{opacity:1;}
  .poll-option-pct{position:relative;z-index:1;color:var(--text-2);flex-shrink:0;font-size:.72rem;}
  .poll-option.voted{border-color:var(--blue);}
  .poll-option.voted .poll-option-fill{background:rgba(59,130,246,.3);}
  .poll-option.voted .poll-option-text{font-weight:700;}
  .poll-footer{margin-top:10px;font-size:.7rem;color:var(--text-3);}

  .pending-attach{display:none;}

  /* ── PHASE 2: Markdown rendering inside bubbles ── */
  .msg-bubble .md-content p, .msg-text-content .md-content p{margin:0;}
  .msg-bubble .md-content p + p, .msg-text-content .md-content p + p{margin-top:6px;}
  .msg-bubble .md-content strong, .msg-text-content .md-content strong{font-weight:700;}
  .msg-bubble .md-content em, .msg-text-content .md-content em{font-style:italic;}
  .msg-bubble .md-content del, .msg-text-content .md-content del{opacity:.75;}
  .msg-bubble .md-content code, .msg-text-content .md-content code{background:rgba(255,255,255,.14);padding:1px 5px;border-radius:4px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.82em;}
  .msg-bubble .md-content pre, .msg-text-content .md-content pre{background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 10px;overflow-x:auto;margin:6px 0;}
  .msg-bubble .md-content pre code, .msg-text-content .md-content pre code{background:none;padding:0;}
  .msg-bubble .md-content blockquote, .msg-text-content .md-content blockquote{border-left:3px solid rgba(255,255,255,.35);padding:2px 0 2px 10px;margin:6px 0;opacity:.85;}
  .msg-bubble .md-content ul, .msg-bubble .md-content ol, .msg-text-content .md-content ul, .msg-text-content .md-content ol{margin:4px 0 4px 18px;}
  .msg-bubble .md-content a, .msg-text-content .md-content a{color:inherit;text-decoration:underline;text-underline-offset:2px;word-break:break-all;}
  .msg-row.theirs .msg-bubble .md-content a, .msg-row.theirs .msg-text-content .md-content a{color:var(--blue);}

  /* ── PHASE 2: Link preview card ── */
  .link-preview-card{display:flex;flex-direction:column;width:280px;max-width:100%;border:1px solid var(--border2);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;background:rgba(255,255,255,.04);margin-top:4px;transition:background .15s,border-color .15s;}
  .link-preview-card:hover{background:rgba(255,255,255,.08);border-color:#3a3a3a;}
  .link-preview-image{width:100%;height:130px;object-fit:cover;background:var(--surface3);display:block;}
  .link-preview-body{padding:9px 11px;display:flex;flex-direction:column;gap:3px;}
  .link-preview-site{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--text-2);text-transform:uppercase;letter-spacing:.03em;}
  .link-preview-favicon{width:13px;height:13px;border-radius:3px;flex-shrink:0;}
  .link-preview-title{font-size:.8rem;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .link-preview-desc{font-size:.74rem;color:var(--text-2);line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}

  /* ── PHASE 2: Upload progress bubble (speed / ETA / pause / cancel) ── */
  .upload-card{width:280px;max-width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:13px;padding:11px 12px;display:flex;flex-direction:column;gap:8px;}
  .upload-card-top{display:flex;align-items:center;gap:10px;}
  .upload-card-icon{width:36px;height:36px;border-radius:9px;background:var(--surface3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-2);}
  .upload-card-icon svg{width:18px;height:18px;}
  .upload-card-info{flex:1;min-width:0;display:flex;flex-direction:column;}
  .upload-card-name{font-size:.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .upload-card-meta{font-size:.7rem;color:var(--text-2);margin-top:1px;}
  .upload-card-actions{display:flex;gap:4px;flex-shrink:0;}
  .upload-card-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:var(--surface3);color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .upload-card-btn:hover{color:#fff;border-color:#555;}
  .upload-card-btn svg{width:13px;height:13px;}
  .upload-progress-track{height:5px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;}
  .upload-progress-bar{height:100%;background:var(--blue);border-radius:99px;transition:width .2s ease;width:0%;}
  .upload-progress-bar.failed{background:var(--red);}
  .upload-progress-bar.paused{background:var(--amber);}

  /* ── PHASE 2: Drag & drop overlay ── */
  .drop-overlay{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:rgba(59,130,246,.12);backdrop-filter:blur(2px);border:3px dashed var(--blue);border-radius:0;pointer-events:none;}
  .drop-overlay.active{display:flex;}
  .drop-overlay svg{width:46px;height:46px;color:var(--blue);}
  .drop-overlay span{font-size:1rem;font-weight:700;color:#fff;}

  @media(max-width:700px){
    .sidebar{display:none;} :root{--bubble-max:78vw;} .emoji-picker{width:250px;left:12px;} .attach-menu{left:12px;}
    .media-grid.n1{width:220px;} .doc-card{width:auto;}
    /* Keep the hover-react cluster reachable at narrow widths instead of
       hiding it outright — it only needs a smaller offset now that it's
       a single button per side, so it still lands on-screen when the
       message row is hovered. */
    .msg-row.mine .msg-hover-actions{left:-36px;}
    .msg-row.theirs .msg-hover-actions{right:-36px;}
    .link-preview-card,.upload-card{width:100%;}
  }
  @media(max-width:460px){
    .msg-row.mine .msg-hover-actions{left:-32px;}
    .msg-row.theirs .msg-hover-actions{right:-32px;}
    .msg-hover-btn{width:26px;height:26px;}
    .msg-hover-btn svg{width:15px;height:15px;}
  }
</style>
</head>
<body>

<header class="topnav">
  <a href="/dashboard" class="topnav-logo">cordEX</a>
  <div class="room-title-wrap">
    <span class="room-title" id="roomTitle">Loading room…</span>
    <span class="room-sub" id="roomSub"><span class="conn-dot" id="connDot"></span> Connecting…</span>
  </div>
  <div class="topnav-right">
    <button class="nav-pill icon-only" id="searchToggleBtn" title="Search messages" style="display:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="nav-pill danger" id="deleteBtn" style="display:none;" onclick="confirmDelete()">Delete Room</button>
    <button class="nav-pill" onclick="leaveRoom()">Leave</button>
  </div>
</header>

<div class="layout" id="layout" style="display:none;">
  <div class="chat-col" id="chatCol">
    <div class="drop-overlay" id="dropOverlay">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Drop to upload</span>

<script>
const roomId = window.location.pathname.split('/').pop();
let ws = null;
let currentUser = null;

let manualLeave = false;
// NEW — the room owner's username, used ONLY to render the sidebar

let roomOwnerUsername = null;

function $(id) { return document.getElementById(id); }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ═══════════════════════════════════════════════════════
   AVATARS — small helper used everywhere a user needs a
   profile picture (messages, sidebar, typing indicator).
   Falls back to a colored initial when no avatarUrl is set
   or the image fails to load.
   ═══════════════════════════════════════════════════════ */
const AVATAR_COLORS = ['#f56565','#ed8936','#ecc94b','#48bb78','#38b2ac','#4299e1','#667eea','#9f7aea','#ed64a6'];
function colorForName(name) {
  let hash = 0;
  const s = name || '?';
  for (let i = 0; i < s.length; i++) hash = s.charCodeAt(i) + ((hash << 5) - hash);
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}
function fallbackAvatar(username, size) {
  const div = document.createElement('div');
  div.className = 'avatar-fallback';
  div.style.background = colorForName(username);
  div.style.fontSize = Math.round(size * 0.42) + 'px';
  div.textContent = (username || '?').trim().charAt(0).toUpperCase() || '?';
  return div;
}
function avatarNode(username, avatarUrl, size) {
  size = size || 28;
  const wrap = document.createElement('div');
  wrap.className = 'avatar-wrap';
  wrap.style.width = size + 'px';
  wrap.style.height = size + 'px';
  if (avatarUrl) {
    const img = document.createElement('img');
    img.className = 'avatar-img';
    img.src = avatarUrl;
    img.alt = username || '';
    img.loading = 'lazy';
    img.onerror = () => { wrap.innerHTML = ''; wrap.appendChild(fallbackAvatar(username, size)); };
    wrap.appendChild(img);
  } else {
    wrap.appendChild(fallbackAvatar(username, size));
  }
  return wrap;
}

/* ═══════════════════════════════════════════════════════
   Generic id generator — used for message clientIds. Falls
   back gracefully if crypto.randomUUID isn't available.
   ═══════════════════════════════════════════════════════ */
function generateId() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2);
}

/* ═══════════════════════════════════════════════════════
   DELETE CONFIRMATION MODAL — reused for both "delete room"
   and "delete message" confirmations (see confirmDeleteMessage).
   ═══════════════════════════════════════════════════════ */
const deleteModalOverlay = document.getElementById('deleteModalOverlay');
const modalCancelBtn      = document.getElementById('modalCancelBtn');
const modalDeleteBtn      = document.getElementById('modalDeleteBtn');
let modalResolver = null;

function openConfirmModal(title, text, confirmLabel) {
  return new Promise((resolve) => {
    modalResolver = resolve;
    $('deleteModalTitle').textContent = title;
    $('deleteModalText').textContent = text;
    modalDeleteBtn.textContent = confirmLabel || 'Delete';
    deleteModalOverlay.classList.add('open');
    modalDeleteBtn.disabled = false;
  });
}
function openDeleteModal() {
  return openConfirmModal('Delete this room?', 'Are you sure you want to permanently delete this room for everyone? This action cannot be undone.', 'Delete');
}
function closeDeleteModal(result) {
  deleteModalOverlay.classList.remove('open');
  if (modalResolver) { modalResolver(result); modalResolver = null; }
}
modalCancelBtn.addEventListener('click', () => closeDeleteModal(false));
modalDeleteBtn.addEventListener('click', () => closeDeleteModal(true));
deleteModalOverlay.addEventListener('click', (e) => { if (e.target === deleteModalOverlay) closeDeleteModal(false); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && deleteModalOverlay.classList.contains('open')) closeDeleteModal(false); });

// ---------- Emoji Picker ----------
const EMOJI_GROUPS = [
  { label: 'Crypto & Trading', emojis: ['🪙','💰','💸','📈','📉','💹','🚀','⚡','🔥','💎','🏦','💳','⚖️','🔒','🔓','🌕','🐂','🐻','⛏️','🧾'] },
  { label: 'Faces', emojis: ['😀','😁','😂','🤣','😊','😍','😘','😎','🤔','😅','🙂','😢','😭','😡','😱','🥳','😴','😇','🤯','🥶'] },
  { label: 'Tasks & Important', emojis: ['✅','❌','⚠️','📌','📝','🕒','⏰','🔔','📢','❗','❓','💡','🔧','📊','🎯','🚩','👍','👎','🙌','🙏'] }
];
const MINI_EMOJI_LIST = EMOJI_GROUPS.reduce((acc, g) => acc.concat(g.emojis), []);
// Quick-react set — the handful shown as one-tap reactions (Discord-style).
const REACTION_EMOJIS = ['👍','❤️','😂','😮','😢','🎉'];

function buildEmojiPicker() {
  const picker = $('emojiPicker');
  picker.innerHTML = EMOJI_GROUPS.map(group => `
    <div class="emoji-group">
      <div class="emoji-group-label">${group.label}</div>
      <div class="emoji-grid">${group.emojis.map(e => `<button type="button" data-emoji="${e}">${e}</button>`).join('')}</div>
    </div>`).join('');
  picker.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-emoji]');
    if (!btn) return;
    insertEmojiInto($('msgInput'), btn.dataset.emoji);
  });
}
function insertEmojiInto(input, emoji) {
  if (!input || input.disabled) return;
  const start = input.selectionStart ?? input.value.length;
  const end = input.selectionEnd ?? input.value.length;
  input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
  const newPos = start + emoji.length;
  input.focus();
  input.setSelectionRange(newPos, newPos);
}
function toggleEmojiPicker(force) {
  const picker = $('emojiPicker'); const btn = $('emojiBtn');
  const open = force !== undefined ? force : !picker.classList.contains('open');
  picker.classList.toggle('open', open);
  btn.classList.toggle('active', open);
}

/* ── Mini emoji popover — shared by the poll question + option inputs.
   Also reused (with a different callback) for message reactions, so
   we don't duplicate a second identical popover component. ── */
let miniEmojiTarget = null;      // an <input> to insert into, OR...
let miniEmojiOnPick = null;      // ...a callback(emoji) for non-input use (reactions)
function buildMiniEmojiPopover() {
  const pop = $('miniEmojiPopover');
  pop.innerHTML = MINI_EMOJI_LIST.map(e => `<button type="button" data-emoji="${e}">${e}</button>`).join('');
  pop.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-emoji]');
    if (!btn) return;
    if (miniEmojiOnPick) miniEmojiOnPick(btn.dataset.emoji);
    else if (miniEmojiTarget) insertEmojiInto(miniEmojiTarget, btn.dataset.emoji);
    closeMiniEmojiPopover();
  });
}
/**
 * Opens the shared mini emoji popover anchored to `anchorEl`.
 * Vertical placement prefers opening BELOW the anchor and flips ABOVE
 * it if there isn't enough room beneath. Horizontal placement prefers
 * right-aligning the popover to the anchor's right edge (so it opens
 * leftward, which suits both incoming-message and own/sent-message
 * anchors sitting near the right side of the screen) and flips to
 * left-aligning with the anchor if that would run off the left edge.
 * Both axes clamp to the viewport as a final safety net so the
 * popover is never clipped or rendered off-screen.
 */
function openMiniEmojiPopover(anchorEl, targetInputOrCallback) {
  closeMiniEmojiPopover();
  if (typeof targetInputOrCallback === 'function') { miniEmojiTarget = null; miniEmojiOnPick = targetInputOrCallback; }
  else { miniEmojiTarget = targetInputOrCallback; miniEmojiOnPick = null; }
  const pop = $('miniEmojiPopover');
  const rect = anchorEl.getBoundingClientRect();
  const popW = 232, popH = 200, margin = 8;

  let top;
  const spaceBelow = window.innerHeight - rect.bottom;
  if (spaceBelow >= popH + margin || rect.top < popH) {
    top = Math.min(rect.bottom + 6, window.innerHeight - popH - margin);
  } else {
    top = Math.max(margin, rect.top - popH - 6);
  }

  let left;
  const preferredLeft = rect.right - popW;
  if (preferredLeft >= margin) {
    left = preferredLeft;
  } else if (rect.left + popW <= window.innerWidth - margin) {
    left = rect.left;
  } else {
    left = Math.max(margin, Math.min(preferredLeft, window.innerWidth - popW - margin));
  }

  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  pop.classList.add('open');
}
function closeMiniEmojiPopover() {
  $('miniEmojiPopover').classList.remove('open');
  miniEmojiTarget = null;
  miniEmojiOnPick = null;
  const pollBtn = document.getElementById('pollEmojiToggleBtn');
  if (pollBtn) pollBtn.classList.remove('active');
}

// ---------- Attach Menu (plus button) ----------
const ATTACH_LIMITS = { image: 5 * 1024 * 1024, video: 200 * 1024 * 1024, document: 50 * 1024 * 1024 };
const ATTACH_ACCEPT = {
  image: 'image/png,image/jpeg,image/gif,image/webp',
  video: 'video/mp4,video/webm,video/quicktime',
  document: '.pdf,.doc,.docx,.txt',
};
const ATTACH_MULTIPLE = { image: true, video: false, document: false };

function toggleAttachMenu(force) {
  const menu = $('attachMenu');
  const open = force !== undefined ? force : !menu.classList.contains('open');
  menu.classList.toggle('open', open);
}
document.querySelectorAll('#attachMenu button[data-kind]').forEach((btn) => {
  btn.addEventListener('click', () => {
    const kind = btn.dataset.kind;
    const input = $('fileInput');
    input.accept = ATTACH_ACCEPT[kind];
    input.multiple = ATTACH_MULTIPLE[kind];
    input.dataset.kind = kind;
    input.value = '';
    input.click();
    toggleAttachMenu(false);
  });
});
$('fileInput').addEventListener('change', () => {
  const kind = $('fileInput').dataset.kind;
  const files = Array.from($('fileInput').files || []);
  if (!files.length) return;

  const oversized = files.find((f) => f.size > ATTACH_LIMITS[kind]);
  if (oversized) {
    appendSystem(`⚠ ${kind} files must be under ${(ATTACH_LIMITS[kind] / (1024 * 1024)).toFixed(0)}MB`);
    return;
  }
  openComposeOverlay(files.map((f) => ({ file: f, kind })));
});

/* ── File-size / doc-type helpers, shared by bubbles + compose preview ── */
function formatFileSize(bytes) {
  if (bytes === null || bytes === undefined || isNaN(bytes)) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}
function docExtInfo(name) {
  const ext = ((name || '').split('.').pop() || '').toLowerCase();
  const map = {
    pdf:  { label: 'PDF', cls: 'pdf' },
    doc:  { label: 'DOC', cls: 'doc' },
    docx: { label: 'DOC', cls: 'doc' },
    txt:  { label: 'TXT', cls: 'txt' },
  };
  return map[ext] || { label: ext ? ext.toUpperCase().slice(0, 4) : 'FILE', cls: 'generic' };
}
function buildDocCard(att) {
  const info = docExtInfo(att.name || '');
  const a = document.createElement('a');
  a.href = att.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
  a.className = 'doc-card';
  a.innerHTML = `
    <div class="doc-icon ${info.cls}">${info.label}</div>
    <div class="doc-info">
      <span class="doc-name">${escapeHtml(att.name || 'Document')}</span>
      <span class="doc-meta">${formatFileSize(att.size)}</span>
    </div>
    <div class="doc-download">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>`;
  return a;
}
function buildDocPreview(file) {
  const info = docExtInfo(file.name || '');
  const div = document.createElement('div');
  div.className = 'doc-card preview-only';
  div.innerHTML = `
    <div class="doc-icon ${info.cls}">${info.label}</div>
    <div class="doc-info">
      <span class="doc-name">${escapeHtml(file.name || 'Document')}</span>
      <span class="doc-meta">${formatFileSize(file.size)}</span>
    </div>`;
  return div;
}
/** Same summary text the server uses for reply previews of media-only
 *  messages — kept in sync so a locally-built reply preview matches
 *  what the server would have produced. */
function attachmentSummaryLabel(atts) {
  if (!atts || !atts.length) return '';
  const a = atts[0];
  if (a.kind === 'image') return atts.length > 1 ? `📷 ${atts.length} photos` : '📷 Photo';
  if (a.kind === 'video') return '🎬 Video';
  return `📄 ${a.name || 'Document'}`;
}

/* ══════════════════════════════════════════════════════
   COMPOSE OVERLAY — preview + caption before send
   ══════════════════════════════════════════════════════ */
let composeItems = [];
let composeActiveIdx = 0;

function openComposeOverlay(items) {
  composeItems = items.map((it) => ({ ...it, objectUrl: it.kind === 'document' ? null : URL.createObjectURL(it.file) }));
  composeActiveIdx = 0;
  renderCompose();
  $('composeOverlay').classList.add('open');
  $('composeCaption').value = '';
  $('composeCaption').focus();
}
function closeComposeOverlay() {
  composeItems.forEach((it) => { if (it.objectUrl) URL.revokeObjectURL(it.objectUrl); });
  composeItems = [];
  $('composeOverlay').classList.remove('open');
}
function renderCompose() {
  const item = composeItems[composeActiveIdx];
  const main = $('composeMain');
  main.innerHTML = '';
  if (!item) return;

  if (item.kind === 'image') {
    const img = document.createElement('img');
    img.src = item.objectUrl;
    main.appendChild(img);
  } else if (item.kind === 'video') {
    const vid = document.createElement('video');
    vid.src = item.objectUrl; vid.controls = true;
    main.appendChild(vid);
  } else {
    main.appendChild(buildDocPreview(item.file));
  }

  if (composeItems.length > 1) {
    const prev = document.createElement('button');
    prev.className = 'compose-nav prev'; prev.textContent = '‹';
    prev.onclick = () => { composeActiveIdx = (composeActiveIdx - 1 + composeItems.length) % composeItems.length; renderCompose(); };
    const next = document.createElement('button');
    next.className = 'compose-nav next'; next.textContent = '›';
    next.onclick = () => { composeActiveIdx = (composeActiveIdx + 1) % composeItems.length; renderCompose(); };
    main.appendChild(prev); main.appendChild(next);
  }

  $('composeCount').textContent = composeItems.length > 1 ? `${composeActiveIdx + 1} / ${composeItems.length}` : '';

  const thumbs = $('composeThumbs');
  thumbs.innerHTML = '';
  if (composeItems.length > 1) {
    composeItems.forEach((it, i) => {
      const t = document.createElement('img');
      t.className = 'compose-thumb' + (i === composeActiveIdx ? ' active' : '');
      t.src = it.kind === 'image' ? it.objectUrl : '';
      if (it.kind !== 'image') { t.style.background = 'var(--surface3)'; }
      t.onclick = () => { composeActiveIdx = i; renderCompose(); };
      thumbs.appendChild(t);
    });
  }
}

/* ══════════════════════════════════════════════════════
   Uploading bubble — blurred, with circular progress ring
   ══════════════════════════════════════════════════════ */
function ringSvg(percent, indeterminate) {
  const r = 15, c = 2 * Math.PI * r;
  const offset = indeterminate ? c * 0.25 : c - (percent / 100) * c;
  return `<svg class="ring${indeterminate ? ' spin' : ''}" viewBox="0 0 36 36">
    <circle class="track" cx="18" cy="18" r="${r}"></circle>
    <circle class="bar" cx="18" cy="18" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle>
  </svg>`;
}

async function sendComposedFiles() {
  if (!composeItems.length) return;
  const caption = $('composeCaption').value.trim();
  const items = composeItems;
  const isDocOnly = items.length === 1 && items[0].kind === 'document';
  const replyToSend = replyTarget;
  closeComposeOverlayKeepingUrls();
  clearReplyTarget();

  const row = document.createElement('div');
  row.className = 'msg-row mine';

  if (isDocOnly) {
    const pending = buildDocPreview(items[0].file);
    row.appendChild(pending);
  } else {
    const previewUrls = items.map((it) => it.objectUrl);
    const kinds = items.map((it) => it.kind);
    const grid = buildUploadingGrid(previewUrls, kinds);
    row.appendChild(grid);
  }
  if (caption) {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble'; bubble.textContent = caption; bubble.style.marginTop = '4px';
    row.appendChild(bubble);
  }
  $('msgs').appendChild(row);
  scrollToBottom();

  try {
    const fd = new FormData();
    items.forEach((it) => fd.append('files', it.file));
    fd.append('roomId', roomId);

    const data = await uploadWithProgress(fd, (pct) => {
      row.querySelectorAll('.tile-spinner').forEach((el) => { el.innerHTML = ringSvg(pct, false); });
    });

    row.remove();
    items.forEach((it) => { if (it.objectUrl) URL.revokeObjectURL(it.objectUrl); });

    if (!data.success) {
      appendSystem('⚠ ' + data.message);
      return;
    }

    // Attachments are already uploaded — hand off to the normal message
    // pipeline so status ticks / retry work exactly like a text message.
    dispatchMessage(caption, data.data, replyToSend);
  } catch (e) {
    row.remove();
    items.forEach((it) => { if (it.objectUrl) URL.revokeObjectURL(it.objectUrl); });
    appendSystem('⚠ Upload failed');
  }
}

function closeComposeOverlayKeepingUrls() {
  $('composeOverlay').classList.remove('open');
  composeItems = [];
}

function buildUploadingGrid(previewUrls, kinds) {
  const n = previewUrls.length;
  const grid = document.createElement('div');
  grid.className = 'media-grid ' + (n === 1 ? 'n1' : n === 2 ? 'n2' : n === 3 ? 'n3' : 'n4plus');
  previewUrls.slice(0, 4).forEach((url, i) => {
    const tile = document.createElement('div');
    tile.className = 'media-tile';
    const bg = document.createElement('div');
    bg.className = 'tile-bg';
    bg.style.backgroundImage = kinds[i] === 'image' ? `url(${url})` : 'none';
    bg.style.background = kinds[i] === 'image' ? bg.style.backgroundImage : 'var(--surface3)';
    tile.appendChild(bg);
    const spinner = document.createElement('div');
    spinner.className = 'tile-spinner';
    spinner.innerHTML = ringSvg(0, true);
    tile.appendChild(spinner);
    grid.appendChild(tile);
  });
  return grid;
}

function uploadWithProgress(formData, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/chat/upload');
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
    };
    xhr.onload = () => {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch (e) { reject(e); }
    };
    xhr.onerror = () => reject(new Error('network error'));
    xhr.send(formData);
  });
}

/* ══════════════════════════════════════════════════════
   POLLS — single-select (radio-style). A user's vote moves
   between options; clicking their current option again clears it.
   ══════════════════════════════════════════════════════ */
function computePollMeta(poll) {
  const voterSet = new Set();
  poll.options.forEach((o) => o.voterIds.forEach((id) => voterSet.add(id)));
  return { totalVoters: voterSet.size };
}

function buildPollCard(poll) {
  const card = document.createElement('div');
  card.className = 'poll-card';
  card.dataset.pollId = poll.pollId;

  const meta = computePollMeta(poll);

  const q = document.createElement('div');
  q.className = 'poll-question';
  q.textContent = poll.question;
  card.appendChild(q);

  const optsWrap = document.createElement('div');
  optsWrap.className = 'poll-options';

  poll.options.forEach((opt) => {
    const mine = !!(currentUser && opt.voterIds.includes(currentUser.id));
    const pct = meta.totalVoters ? Math.round((opt.voterIds.length / meta.totalVoters) * 100) : 0;

    const row = document.createElement('button');
    row.type = 'button';
    row.className = 'poll-option' + (mine ? ' voted' : '');
    row.innerHTML = `
      <div class="poll-option-fill" style="width:${pct}%"></div>
      <span class="poll-option-text"><span class="poll-option-radio"></span>${escapeHtml(opt.text)}</span>
      <span class="poll-option-pct">${pct}% · ${opt.voterIds.length}</span>
    `;
    row.addEventListener('click', () => votePoll(poll.pollId, opt.id));
    optsWrap.appendChild(row);
  });

  card.appendChild(optsWrap);

  const footer = document.createElement('div');
  footer.className = 'poll-footer';
  footer.textContent = `${meta.totalVoters} vote${meta.totalVoters === 1 ? '' : 's'} · poll by ${poll.createdBy} · pick one`;

  return card;
}

/* ── Date separators ──
   Rebuilt from scratch on every batch update rather than tracked
   incrementally — simplest way to stay correct whether messages were
   appended at the bottom or prepended at the top via infinite scroll. */
function dateKeyOf(ts) { return new Date(ts).toDateString(); }
function formatDateLabel(ts) {
  const date = new Date(ts);
  const today = new Date();
  const yest = new Date(); yest.setDate(today.getDate() - 1);
  if (dateKeyOf(date) === dateKeyOf(today)) return 'Today';
  if (dateKeyOf(date) === dateKeyOf(yest)) return 'Yesterday';
  const opts = { month: 'long', day: 'numeric' };
  if (date.getFullYear() !== today.getFullYear()) opts.year = 'numeric';
  return date.toLocaleDateString([], opts);
}
function rebuildDateSeparators() {
  const container = $('msgs');
  container.querySelectorAll('.date-separator').forEach((el) => el.remove());
  let lastKey = null;
  Array.from(container.children).forEach((row) => {
    if (!row.classList.contains('msg-row') || !row.dataset.timestamp) return;
    const key = dateKeyOf(row.dataset.timestamp);
    if (key !== lastKey) {
      const sep = document.createElement('div');
      sep.className = 'date-separator';
      sep.innerHTML = `<span>${escapeHtml(formatDateLabel(row.dataset.timestamp))}</span>`;
      container.insertBefore(sep, row);
      lastKey = key;
    }
  });
}

function buildMediaGrid(mediaAtts) {
  const n = mediaAtts.length;
  const grid = document.createElement('div');
  grid.className = 'media-grid ' + (n === 1 ? 'n1' : n === 2 ? 'n2' : n === 3 ? 'n3' : 'n4plus');

  const shown = mediaAtts.slice(0, 4);
  shown.forEach((att, i) => {
    const tile = document.createElement('div');
    tile.className = 'media-tile';

    if (att.lqip) {
      const bg = document.createElement('div');

    }

    const spinner = document.createElement('div');

    if (att.kind === 'image') {

      tile.appendChild(badge);

}
function formatDuration(seconds) {
  if (!isFinite(seconds) || seconds < 0) return '0:00';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

/* ── Status ticks (own messages only) ── */
function statusIconSvg(status) {
  if (status === 'sending') return `<svg class="status-icon spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8" stroke-dasharray="38" stroke-dashoffset="12"/></svg>`;
  if (status === 'sent') return `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 17 20 6"/></svg>`;
  if (status === 'delivered') return `<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 12 6 17 15 6"/><polyline points="8 12 13 17 23 6"/></svg>`;
  if (status === 'read') return `<svg class="status-icon read" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 12 6 17 15 6"/><polyline points="8 12 13 17 23 6"/></svg>`;
  if (status === 'failed') return `<svg class="status-icon failed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.3" r="0.6" fill="currentColor"/></svg>`;

}

/* ── Bubble text / deleted / edited rendering ──
   PHASE 2: text is now rendered as sanitized Markdown instead of plain
   text. marked() converts the markdown to HTML, DOMPurify strips
   anything dangerous (script tags, event handler attributes, javascript:
   URLs, etc) before it ever touches innerHTML. Raw HTML in the source
   message is disabled in marked's config below, so someone typing
   "<img onerror=...>" just sees literal escaped text, not markup. */
if (window.marked) {
  marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
}
function renderMarkdownSafe(text) {
  if (!text) return '';
  if (!window.marked || !window.DOMPurify) return escapeHtml(text); // CDN failed to load — fail safe to plain escaped text
  const rawHtml = marked.parse(text, { silent: true });
  return DOMPurify.sanitize(rawHtml, {
    ALLOWED_TAGS: ['p','br','strong','em','del','code','pre','blockquote','ul','ol','li','a'],
    ALLOWED_ATTR: ['href','target','rel'],
    ALLOW_DATA_ATTR: false,
  });
}
function renderBubbleText(bubble, message) {
  bubble.innerHTML = '';
  if (message.deletedForEveryone) {
    bubble.classList.add('deleted');
    bubble.textContent = 'This message was deleted.';
    return;
  }
  bubble.classList.remove('deleted');
  const content = document.createElement('div');
  content.className = 'md-content';
  content.innerHTML = renderMarkdownSafe(message.text || '');
  // Force every link to open safely in a new tab regardless of what
  // marked/DOMPurify let through for target/rel.
  content.querySelectorAll('a[href]').forEach((a) => {
    a.target = '_blank';
    a.rel = 'noopener noreferrer nofollow';
  });
  bubble.appendChild(content);
}
