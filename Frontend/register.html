<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sellora — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --input-bg: #f9fafb;
      --input-focus-border: #4f46e5;
      --error: #ef4444;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: var(--text-main);
    }

    /* Logo / Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .brand-name {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-main);
    }

    /* Card */
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
    }

    .card-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .card-header h1 {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
    }

    .card-header p {
      margin-top: 6px;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      padding-right: 40px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text-main);
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: #b0b7c3;
    }

    input:focus {
      border-color: var(--input-focus-border);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    /* Toggle password icon */
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: var(--text-muted);
    }

    .toggle-pw:hover {
      color: var(--text-main);
    }

    .toggle-pw svg {
      width: 18px;
      height: 18px;
    }

    /* Register button */
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 6px;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-primary:active {
      transform: scale(0.99);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--text-muted);
      font-size: 0.8125rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Social buttons */
    .social-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-main);
      cursor: pointer;
    }

    .btn-social:hover {
      background: var(--bg);
      border-color: #d1d5db;
    }

    .btn-social svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Footer */
    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .card-footer a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .card-footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }

      .card-header h1 {
        font-size: 1.4rem;
      }

      .social-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="brand-name">Sellora</span>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-header">
      <h1>Create an Account</h1>
      <p>Join now to streamline your experience from day one.</p>
    </div>

    <form action="/register" method="POST" novalidate>

      <div class="form-group">
        <label for="name">Name</label>
        <div class="input-wrapper">
          <input type="text" id="name" name="name" placeholder="Roger Gerrard" autocomplete="name" required />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" name="email" placeholder="sellostars@company.com" autocomplete="email" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" placeholder="Create a password" autocomplete="new-password" required />
          <button type="button" class="toggle-pw" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirm-password" name="confirmPassword" placeholder="Repeat your password" autocomplete="new-password" required />
          <button type="button" class="toggle-pw" onclick="togglePassword('confirm-password', this)" aria-label="Toggle confirm password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary">Register</button>
    </form>

    <div class="divider">Or sign up with</div>

    <div class="social-buttons">
      <button type="button" class="btn-social">
        <!-- Google -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>

      <button type="button" class="btn-social">
        <!-- Apple -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.39.07 2.36.74 3.17.8 1.21-.24 2.37-.93 3.67-.84 1.55.12 2.72.77 3.46 1.95-3.17 1.84-2.42 5.9.68 7.08-.56 1.37-1.27 2.72-2.98 3.89zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
        Apple
      </button>
    </div>

    <div class="card-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden
        ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L6.59 6.59m7.532 7.532l3.29 3.29M3 3l18 18" />
           </svg>`
        : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
           </svg>`;
    }
  </script>


   <script>
      document.querySelector("form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);

      const email = formData.get("email");

      const body = new URLSearchParams(formData);

      const res = await fetch("/register", {
        method: "POST",
        body
      });

      const data = await res.json();

      if (data.success) {
        alert("✅ " + data.message);
        e.target.reset();
        window.location.href = "/verify-email?email=" + encodeURIComponent(email);
      }
      
      else {
        alert("❌ " + data.message);
     }
   });
   
</script>

</body>
</html>
